<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سحابة فواتير الناصرية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #10b981;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            border-radius: 0; /* لملاءمة الشاشة بالكامل كما في طلبك */
        }

        @media (min-width: 600px) {
            .container {
                margin: 20px;
                border-radius: 24px;
                height: auto;
                min-height: 90vh;
            }
        }

        h2 { 
            text-align: center; 
            color: var(--primary); 
            margin-bottom: 30px; 
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            margin: 8px 0;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            background: white;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .row { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 12px; 
            background: #f1f5f9;
            padding: 10px;
            border-radius: 14px;
            align-items: center;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 12px;
            transition: all 0.2s active;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:active { transform: scale(0.98); }

        .btn-add { 
            background: white; 
            color: var(--primary); 
            border: 2px dashed #cbd5e1;
        }
        
        .btn-add:hover { background: #f8fafc; border-color: var(--primary); }

        .btn-save { 
            background: var(--accent); 
            color: white; 
            font-size: 18px;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }

        #grandTotal {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            border-radius: 18px;
            margin-top: auto; /* يدفع المجموع للأسفل */
            box-shadow: 0 10px 15px -3px rgba(30, 41, 59, 0.3);
        }

        .label-lang {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
            display: block;
            font-weight: 600;
        }

        .item-total {
            font-family: 'Courier New', Courier, monospace;
            background: #fff;
            padding: 8px;
            border-radius: 8px;
            min-width: 60px;
        }

    </style>
</head>
<body>

    <div class="container">
        <h2>فاتورة مشاتل الناصريه<span style="color:var(--accent)"></span></h2>
        
        <div class="input-group">
            <span class="label-lang">اسم العميل | গ্রাহকের নাম</span>
            <input type="text" id="customerName" placeholder="اكتب الاسم هنا...">
        </div>

        <div id="itemsList">
            <div class="row">
                <input type="text" class="item-name" placeholder="ক্লাস" style="width: 40%;">
                <input type="number" class="qty" placeholder="পরিমাণ" oninput="calculate()" style="width: 20%;">
                <input type="number" class="price" placeholder="দাম" oninput="calculate()" style="width: 20%;">
                <div class="item-total" style="width: 20%; font-weight: bold; text-align: center; color: var(--accent);">0</div>
            </div>
        </div>

        <button class="btn-add" onclick="addRow()">
            <span>➕</span> إضافة صنف | নতুন যোগ করুন
        </button>
        
        <button class="btn-save" id="saveBtn" onclick="saveToCloud()">
            💾 حفظ سحابي | সংরক্ষণ করুন
        </button>
        
        <div id="grandTotal">0.00 <small style="font-size: 14px;">ر.س</small></div>
    </div>

    <script>
        // البيانات كما هي تماماً
        const SUPABASE_URL = 'https://doetvkkalypdktwiutex.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function calculate() {
            let totalAll = 0;
            const rows = document.querySelectorAll('#itemsList .row');
            rows.forEach(row => {
                const q = parseFloat(row.querySelector('.qty').value) || 0;
                const p = parseFloat(row.querySelector('.price').value) || 0;
                const rowResult = q * p;
                row.querySelector('.item-total').innerText = rowResult.toFixed(2);
                totalAll += rowResult;
            });
            document.getElementById('grandTotal').innerHTML = totalAll.toFixed(2) + ' <small style="font-size: 16px;">ر.س</small>';
            return totalAll;
        }

        function addRow() {
            const list = document.getElementById('itemsList');
            const newRow = document.createElement('div');
            newRow.className = 'row';
            newRow.innerHTML = `
                <input type="text" class="item-name" placeholder="صنف جديد" style="width: 40%;">
                <input type="number" class="qty" placeholder="0" oninput="calculate()" style="width: 20%;">
                <input type="number" class="price" placeholder="0" oninput="calculate()" style="width: 20%;">
                <div class="item-total" style="width: 20%; font-weight: bold; text-align: center; color: var(--accent);">0</div>
            `;
            list.appendChild(newRow);
        }

        async function saveToCloud() {
            const name = document.getElementById('customerName').value || "عميل بدون اسم";
            const total = calculate();
            let itemsData = [];
            document.querySelectorAll('#itemsList .row').forEach(row => {
                const item = row.querySelector('.item-name').value || "صنف";
                const q = row.querySelector('.qty').value || 0;
                const p = row.querySelector('.price').value || 0;
                if(q > 0) itemsData.push({item, q, p, t: (q*p).toFixed(2)});
            });

            if (itemsData.length === 0) { alert("أضف صنفاً واحداً على الأقل"); return; }

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "⏳ جاري الحفظ...";
            saveBtn.disabled = true;

            try {
                const { error } = await _supabase.from('invoices').insert([{ 
                    customer_name: name + "||" + JSON.stringify(itemsData), 
                    total_amount: total 
                }]);
                if (error) throw error;
                alert("تم الحفظ في السحابة بنجاح! ✅");
                document.getElementById('customerName').value = "";
                document.getElementById('itemsList').innerHTML = ""; 
                addRow(); calculate();
            } catch (err) { 
                alert("فشل الحفظ: تأكد من الاتصال"); 
            } 
            finally { 
                saveBtn.innerText = "💾 حفظ سحابي | সংরক্ষণ"; 
                saveBtn.disabled = false; 
            }
        }
    </script>
</body>
</html>
