<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سحابة فواتير الناصرية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 0;
            margin: 0;
            background-color: #f0f2f5;
            color: #1a1a1a;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            height: 100vh;
            margin: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: #12192c; margin-bottom: 20px; }

        input {
            width: 100%;
            margin: 5px 0;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 16px;
        }

        .row { display: flex; gap: 8px; margin-bottom: 10px; }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-add { background: #12192c; color: white; }
        .btn-save { background: #4fac81; color: white; font-size: 18px; }
        .btn-archive {
            background: #3498db;
            color: white;
            font-size: 16px;
            margin-top: 5px;
            text-decoration: none;
            display: block;
            text-align: center;
            line-height: 24px;
        }

        .btn-delete-all { background: #e74c3c; color: white; margin-bottom: 15px; }
        .btn-delete-all:hover { background: #c0392b; }

        #grandTotal {
            background: #12192c;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            border-radius: 10px;
            margin-top: 15px;
        }

        #archiveModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: #f0f2f5;
            max-width: 600px;
            margin: auto;
            border-radius: 20px;
            padding: 20px;
            position: relative;
        }

        .close-btn {
            position: sticky;
            top: 0;
            background: #e74c3c;
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .invoice-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #eee;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .details-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }

        .details-table th {
            color: #888;
            text-align: right;
            padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
        }

        .details-table td {
            padding: 8px 0;
            border-bottom: 1px solid #f9f9f9;
        }

        .total-row {
            color: #4fac81;
            font-weight: bold;
            font-size: 18px;
            text-align: left;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>الناصريه ☁️</h2>
        <input type="text" id="customerName" placeholder="اسم العميل">
<div id="itemsList">
            <div class="row">
                <input type="text" class="item-name" placeholder="الصنف" style="width: 40%;">
                <input type="number" class="qty" placeholder="كمية" oninput="calculate()" style="width: 20%;">
                <input type="number" class="price" placeholder="سعر" oninput="calculate()" style="width: 20%;">
                <div class="item-total" style="width: 20%; align-self: center; font-weight: bold; text-align: center;">0</div>
            </div>
        </div>

        <button class="btn-add" onclick="addRow()">+ إضافة صنف جديد</button>
        <button class="btn-save" id="saveBtn" onclick="saveToCloud()">💾 حفظ سحابي</button>
        
        <div id="grandTotal">0.00 ر.س</div>
    </div>

    <!-- باقي الجافاسكربت بدون تغيير -->
    <script>
        const SUPABASE_URL = 'https://doetvkkalypdktwiutex.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function calculate() {
            let totalAll = 0;
            const rows = document.querySelectorAll('#itemsList .row');
            rows.forEach(row => {
                const q = parseFloat(row.querySelector('.qty').value) || 0;
                const p = parseFloat(row.querySelector('.price').value) || 0;
                const rowResult = q * p;
                row.querySelector('.item-total').innerText = rowResult.toFixed(2);
                totalAll += rowResult;
            });
            document.getElementById('grandTotal').innerText = totalAll.toFixed(2) + " ر.س";
            return totalAll;
        }

        function addRow() {
            const list = document.getElementById('itemsList');
            const newRow = document.createElement('div');
            newRow.className = 'row';
            newRow.innerHTML = `
                <input type="text" class="item-name" placeholder="صنف جديد" style="width: 40%;">
                <input type="number" class="qty" placeholder="0" oninput="calculate()" style="width: 20%;">
                <input type="number" class="price" placeholder="0" oninput="calculate()" style="width: 20%;">
                <div class="item-total" style="width: 20%; align-self: center; font-weight: bold; text-align: center;">0</div>
            `;
            list.appendChild(newRow);
        }

        async function saveToCloud() {
            const name = document.getElementById('customerName').value || "عميل بدون اسم";
            const total = calculate();
            let itemsData = [];
            document.querySelectorAll('#itemsList .row').forEach(row => {
                const item = row.querySelector('.item-name').value || "صنف";
                const q = row.querySelector('.qty').value || 0;
                const p = row.querySelector('.price').value || 0;
                if(q > 0) itemsData.push({item, q, p, t: (q*p).toFixed(2)});
            });

            if (itemsData.length === 0) { alert("أضف صنفاً واحداً على الأقل"); return; }

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "جاري الحفظ...";
            saveBtn.disabled = true;

            try {
                const { error } = await _supabase.from('invoices').insert([{ 
                    customer_name: name + "||" + JSON.stringify(itemsData), 
                    total_amount: total 
                }]);
                if (error) throw error;
                alert("تم الحفظ بنجاح! ✅");
                document.getElementById('customerName').value = "";
                document.getElementById('itemsList').innerHTML = ""; 
                addRow(); calculate();
            } catch (err) { alert("فشل الحفظ"); } 
            finally { saveBtn.innerText = "💾 حفظ سحابي"; saveBtn.disabled = false; }
        }
    </script>
</body>
</html>
