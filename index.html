<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الناصرية - إدخال الفواتير</title>
    <style>
        /* التنسيق الجديد - أكبر وأوضح */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            padding: 20px; 
            font-size: 18px; /* تكبير الخط العام */
        }
        .container { 
            max-width: 900px; /* توسيع الحاوية */
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        h2 { text-align: center; color: #1a2a6c; font-size: 28px; margin-bottom: 25px; }
        
        .row { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 15px; 
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
        }
        input { 
            padding: 15px; /* تكبير مربعات الإدخال */
            border: 2px solid #ddd; 
            border-radius: 8px; 
            flex: 1; 
            font-size: 18px; 
        }
        input:focus { border-color: #2980b9; outline: none; }

        .btn-add { 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            padding: 15px 25px; 
            cursor: pointer; 
            border-radius: 8px; 
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .btn-save { 
            background-color: #2980b9; 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 20px; 
            cursor: pointer; 
            border-radius: 10px; 
            font-size: 22px; 
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-save:hover { background-color: #1f6391; }

        .total-box { 
            background: #2c3e50; 
            color: white; 
            padding: 20px; 
            border-radius: 10px; 
            text-align: center; 
            font-size: 24px; 
            margin-top: 20px;
        }

        /* تنسيق السجل الأسفل */
        .archive-section { margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 18px; }
        th, td { border: 1px solid #eee; padding: 15px; text-align: center; }
        th { background-color: #2980b9; color: white; }
        tr:nth-child(even) { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2>☁️ نظام فواتير الناصرية</h2>
    
    <div id="itemsList">
        <div class="row">
            <input type="text" class="item-name" placeholder="اسم الصنف (مثلاً: بذور)">
            <input type="number" class="qty" placeholder="الكمية" oninput="calculateTotal()">
            <input type="number" class="price" placeholder="السعر" oninput="calculateTotal()">
        </div>
    </div>

    <button class="btn-add" onclick="addRow()">+ إضافة صنف آخر</button>
    
    <div class="total-box">
        الإجمالي الكلي: <span id="grandTotal">0.00</span> ر.س
    </div>

    <button class="btn-save" id="saveBtn" onclick="saveToCloud()">حفظ الفاتورة الآن 💾</button>

    <div class="archive-section">
        <h3>📋 سجل العمليات الأخير</h3>
        <table id="invoicesTable">
            <thead>
                <tr>
                    <th>الوقت والتاريخ</th>
                    <th>الأصناف</th>
                    <th>المبلغ</th>
                </tr>
            </thead>
            <tbody id="invoicesTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    function addRow() {
        const div = document.createElement('div');
        div.className = 'row';
        div.innerHTML = `
            <input type="text" class="item-name" placeholder="اسم الصنف">
<input type="number" class="qty" placeholder="الكمية" oninput="calculateTotal()">
            <input type="number" class="price" placeholder="السعر" oninput="calculateTotal()">
        `;
        document.getElementById('itemsList').appendChild(div);
    }

    function calculateTotal() {
        let total = 0;
        const rows = document.querySelectorAll('.row');
        rows.forEach(row => {
            const qty = row.querySelector('.qty').value || 0;
            const price = row.querySelector('.price').value || 0;
            total += (qty * price);
        });
        document.getElementById('grandTotal').innerText = total.toFixed(2);
    }

    function saveToCloud() {
        const total = document.getElementById('grandTotal').innerText;
        if (total == "0.00") return alert("أدخل بيانات الفاتورة أولاً يا نايف");

        const invoice = {
            id: Date.now(),
            date: new Date().toLocaleString('ar-SA'),
            amount: total,
            itemsCount: document.querySelectorAll('.row').length
        };

        // الحفظ في المتصفح مؤقتاً للتحديث التلقائي
        let history = JSON.parse(localStorage.getItem('naif_invoices')) || [];
        history.unshift(invoice); 
        localStorage.setItem('naif_invoices', JSON.stringify(history));

        // تحديث الجدول فوراً بدون ريفريش
        renderTable();

        alert("تم الحفظ والتحديث بنجاح ✅");
        
        // تصفير الخانات للفاتورة الجديدة
        document.getElementById('itemsList').innerHTML = `
            <div class="row">
                <input type="text" class="item-name" placeholder="اسم الصنف">
                <input type="number" class="qty" placeholder="الكمية" oninput="calculateTotal()">
                <input type="number" class="price" placeholder="السعر" oninput="calculateTotal()">
            </div>
        `;
        document.getElementById('grandTotal').innerText = "0.00";
    }

    function renderTable() {
        const history = JSON.parse(localStorage.getItem('naif_invoices')) || [];
        const tbody = document.getElementById('invoicesTableBody');
        tbody.innerHTML = "";

        history.forEach(inv => {
            tbody.innerHTML += `
                <tr>
                    <td>${inv.date}</td>
                    <td>${inv.itemsCount}</td>
                    <td>${inv.amount} ر.س</td>
                </tr>
            `;
        });
    }

    // تشغيل الجدول عند فتح الصفحة
    window.onload = renderTable;
</script>

</body>
</html>
