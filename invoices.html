<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام فواتير الناصرية المطوّر</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #10b981;
            --red-danger: #ef4444; /* لون الآجل */
            --bg: #f8fafc;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); padding: 20px; direction: rtl; }
        .container { max-width: 900px; margin: auto; }

        .header {
            background: var(--primary); color: white; padding: 20px;
            border-radius: 15px; text-align: center; margin-bottom: 30px;
        }

        .invoice-card {
            background: white; padding: 20px; border-radius: 12px;
            margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease; border: 2px solid transparent;
        }

        /* تنسيق الفاتورة الآجلة (باللون الأحمر) */
        .card-urgent { 
            background-color: #fee2e2 !important; 
            border-color: var(--red-danger) !important; 
        }

        .returned-items-box {
            margin-top: 15px; padding: 10px;
            background: #f1f5f9; border-radius: 8px;
            border-right: 4px solid #64748b; font-size: 0.9rem;
        }

        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }

        .btn {
            padding: 10px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn-returned { background: #64748b; color: white; }
        .btn-urgent { background: var(--red-danger); color: white; }
        .btn-reset { background: #e2e8f0; color: #475569; }
        .btn:hover { opacity: 0.8; }

        .total { font-size: 1.4rem; font-weight: 800; color: var(--primary); margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>نظام إدارة فواتير الناصرية</h2>
    </div>

    <div id="main-content">
        <div style="text-align:center;">جاري تحميل الفواتير...</div>
    </div>
</div>

<script>
    const SB_URL = 'https://doetvkkalypdktwiutex.supabase.co';
    const PUBLIC_KEY = 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir';
    const _supabase = supabase.createClient(SB_URL, PUBLIC_KEY);

    async function loadInvoices() {
        const content = document.getElementById('main-content');
        try {
            const { data, error } = await _supabase
                .from('invoices')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            content.innerHTML = data.map(inv => {
                const isUrgent = inv.status === "آجل";
                const returnedItems = inv.returned_items || ""; // نفترض وجود عمود بهذا الاسم في الجدول

                return `
                    <div class="invoice-card ${isUrgent ? 'card-urgent' : ''}" id="card-${inv.id}">
                        <div style="display:flex; justify-content:space-between;">
                            <strong>👤 عميل: ${inv.customer_name || 'بدون اسم'}</strong>
                            <span>📅 ${new Date(inv.created_at).toLocaleDateString('ar-SA')}</span>
                        </div>
                        
                        <div class="total">المبلغ: ${inv.total_amount} ر.س</div>

                        ${returnedItems ? `
                            <div class="returned-items-box">
                                <strong>📦 الأصناف المسترجعة:</strong><br>
                                ${returnedItems}
                            </div>
                        ` : ''}

                        <div class="actions">
                            <button class="btn btn-returned" onclick="markAsReturned('${inv.id}')">🔄 مسترد</button>
<button class="btn btn-urgent" onclick="markAsUrgent('${inv.id}')">🔴 آجل</button>
                            <button class="btn btn-reset" onclick="resetStatus('${inv.id}')">إعادة ضبط</button>
                        </div>
                    </div>
                `;
            }).join('');

        } catch (err) {
            content.innerHTML = <div style="color:red; text-align:center;">خطأ في الاتصال: ${err.message}</div>;
        }
    }

    // وظيفة "مسترد" مع إدخال الأصناف
    async function markAsReturned(id) {
        const items = prompt("الرجاء كتابة الأصناف المسترجعة:");
        if (items !== null) {
            const { error } = await _supabase
                .from('invoices')
                .update({ 
                    status: 'مسترد',
                    returned_items: items // تأكد من إضافة هذا العمود في Supabase
                })
                .eq('id', id);
            
            if (!error) loadInvoices();
        }
    }

    // وظيفة "آجل" لتحويل اللون للأحمر
    async function markAsUrgent(id) {
        const { error } = await _supabase
            .from('invoices')
            .update({ status: 'آجل' })
            .eq('id', id);
        
        if (!error) loadInvoices();
    }

    // إعادة الفاتورة لوضعها الطبيعي
    async function resetStatus(id) {
        const { error } = await _supabase
            .from('invoices')
            .update({ status: '', returned_items: null })
            .eq('id', id);
        
        if (!error) loadInvoices();
    }

    window.onload = loadInvoices;
</script>
</body>
</html>
