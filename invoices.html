<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل فواتير مشاتل الناصرية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary-color: #12192c; 
            --accent-color: #4fac81; 
            --bg-color: #f0f2f5; 
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
            --refund-color: #e74c3c;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #1a1a1a; }
        
        /* شاشة الحجب */
        #lockScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary-color); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
        }
        #lockScreen input {
            padding: 15px; border-radius: 10px; border: none; width: 200px;
            text-align: center; font-size: 24px; margin-top: 20px;
        }

        .container { max-width: 800px; margin: auto; display: none; }

        .header-box { 
            background: white; padding: 20px; border-radius: 15px; 
            display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; 
            box-shadow: var(--card-shadow); position: sticky; top: 10px; z-index: 100; 
        }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; }

        /* ستايل الرادار الحقيقي */
        .presence-tag {
            background: #f0fdf4; color: #166534; padding: 5px 12px;
            border-radius: 20px; font-size: 12px; font-weight: bold;
            border: 1px solid #bbf7d0; display: flex; align-items: center; gap: 6px;
        }
        .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }

        .invoice-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: var(--card-shadow); border: 1px solid #eee; }
        .details-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        .details-table th { color: #999; text-align: right; padding: 8px 0; border-bottom: 1px solid #eee; }
        .details-table td { padding: 10px 0; border-bottom: 1px solid #fcfcfc; }
        .total-section { margin-top: 15px; text-align: left; color: var(--accent-color); font-weight: bold; font-size: 20px; border-top: 1px dashed #ddd; padding-top: 10px; }
        
        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-refund { background: #fef2f2; color: var(--refund-color); border: 1px solid #fee2e2; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 10px; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 500px; }
    </style>
</head>
<body>

    <div id="lockScreen">
        <h2>🔒 نظام مشاتل الناصرية</h2>
        <p>يرجى إدخال رمز الوصول للمتابعة</p>
        <input type="password" id="pinCode" placeholder="****" oninput="verifyAccess(this.value)">
    </div>

    <div class="container" id="mainApp">
        <div class="header-box">
            <div class="header-top">
                <h2>سجل فواتير الناصرية</h2>
                <div class="presence-tag">
                    <span class="online-dot"></span>
                    متصل الآن: <span id="liveDevices">1</span>
                </div>
            </div>
            <div id="statusText" style="font-size: 12px; color: #666;">✅ اتصال مشفر وآمن</div>
        </div>
        <div id="archiveList"></div>
    </div>

    <div id="refundModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color: var(--refund-color);">🔄 تسجيل مسترجعات</h3>
            <div id="refundTable"></div>
            <button onclick="addRefundRow()" style="width:100%; padding:10px; margin:10px 0;">+ إضافة صنف</button>
            <div style="text-align:center; font-size:20px; font-weight:bold; margin:10px 0;">
                الإجمالي: <span id="refundTotalDisplay">0.00</span>
            </div>
            <button class="btn" style="background:var(--refund-color); color:white; width:100%;" onclick="confirmRefund()">💾 حفظ في السحابة</button>
            <button class="btn" style="width:100%; margin-top:5px;" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://doetvkkalypdktwiutex.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // الرقم السري الخاص بك (يمكنك تعديله هنا)
        const MY_SECRET_PIN = "1234";

        function verifyAccess(val) {
            if(val === MY_SECRET_PIN) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                startEngine();
            }
        }

        // --- نظام الرادار القاري الحقيقي ---
        async function trackPresence() {
            const channel = _supabase.channel('nasseria_presence', {
                config: { presence: { key: 'device' } }
            });

            channel
                .on('presence', { event: 'sync' }, () => {
                    const state = channel.presenceState();
                    const count = Object.keys(state).length;
                    document.getElementById('liveDevices').innerText = count;
                    
                    // تنبيه بصري إذا دخل شخص غريب (أكثر من جهازك)
                    if(count > 1) {
                        document.querySelector('.presence-tag').style.backgroundColor = '#fee2e2';
                        document.querySelector('.presence-tag').style.color = '#b91c1c';
                    } else {
                        document.querySelector('.presence-tag').style.backgroundColor = '#f0fdf4';
                        document.querySelector('.presence-tag').style.color = '#166534';
                    }
                })
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        await channel.track({ online_at: new Date().toISOString() });
                    }
                });
        }

        // --- وظائف جلب الفواتير (بدون تعديل في البيانات) ---
        async function fetchInvoices() {
            const { data, error } = await _supabase.from('invoices').select('*').order('created_at', { ascending: false });
            if (error) return;
            
            document.getElementById('archiveList').innerHTML = data.map(inv => {
                const parts = inv.customer_name ? inv.customer_name.split("||") : ["عميل مجهول"];
                return `
                    <div class="invoice-card">
                        <div style="font-weight:bold; font-size:18px;">👤 ${parts[0]}</div>
                        <div style="font-size:12px; color:#999;">${new Date(inv.created_at).toLocaleString('ar-SA')}</div>
                        <div class="total-section">${inv.total_amount.toLocaleString()} ر.س</div>
                        <div class="action-buttons">
                            <button class="btn btn-refund" onclick="openRefundModal('${inv.id}', '${parts[0]}')">🔄 مسترجعات</button>
                        </div>
                    </div>`;
            }).join('');
        }

        // تشغيل كل الأنظمة
        function startEngine() {
            fetchInvoices();
            trackPresence();
            // تحديث تلقائي عند أي تغيير في السحابة
            _supabase.channel('db_changes').on('postgres_changes', { event: '*', schema: 'public', table: 'invoices' }, () => fetchInvoices()).subscribe();
        }

        // وظائف المودال المختصرة (لضمان عمل الكود)
        function openRefundModal(id, name) { document.getElementById('refundModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('refundModal').style.display = 'none'; }
    </script>
</body>
</html>
