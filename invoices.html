<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل فواتير الناصرية 🕒</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary-color: #12192c; 
            --accent-color: #4fac81; 
            --bg-color: #f0f2f5; 
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
            --refund-color: #e74c3c;
            --credit-color: #f39c12;
            --credit-bg: #fff9e6;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #1a1a1a; }
        .container { max-width: 800px; margin: auto; }

        .header-box { background: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; box-shadow: var(--card-shadow); }
        
        /* تصميم كرت الفاتورة */
        .invoice-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: var(--card-shadow); border: 1px solid #eee; position: relative; transition: 0.3s; }
        
        /* شكل الفاتورة عندما تكون آجل */
        .invoice-card.is-credit { background-color: var(--credit-bg); border: 2px solid var(--credit-color); }
        .credit-label { position: absolute; top: 10px; left: 10px; background: var(--credit-color); color: white; padding: 3px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; }

        .details-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        .details-table th { color: #999; text-align: right; padding: 8px 0; border-bottom: 1px solid #eee; }
        .details-table td { padding: 10px 0; border-bottom: 1px solid #fcfcfc; }
        
        .total-section { margin-top: 15px; text-align: left; color: var(--accent-color); font-weight: bold; font-size: 20px; border-top: 1px dashed #ddd; padding-top: 10px; }

        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        
        .btn-refund { background: #fef2f2; color: var(--refund-color); border: 1px solid #fee2e2; }
        .btn-credit { background: #fffbeb; color: var(--credit-color); border: 1px solid #fef3c7; }
        .btn-active-credit { background: var(--credit-color); color: white; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 15px; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; }
        .refund-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .refund-row input { padding: 10px; border-radius: 8px; border: 1px solid #ddd; flex: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-box">
            <h2>🕒 سجل فواتير الناصرية</h2>
            <div style="color: var(--accent-color); font-weight: bold;">متصل بالسحابة ✅</div>
        </div>
        <div id="archiveList"></div>
    </div>

    <div id="refundModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color: var(--refund-color);">🔄 تسجيل مسترجع</h3>
            <div id="refundTable"></div>
            <button onclick="addRefundRow()" style="width: 100%; padding: 10px; margin-bottom: 15px;">+ صنف جديد</button>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-refund" id="saveRefundBtn" onclick="confirmRefund()">حفظ المرتجع</button>
                <button class="btn" onclick="closeModal()" style="background:#eee;">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://doetvkkalypdktwiutex.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeInvoiceId = null;

        async function fetchInvoices() {
            const listContainer = document.getElementById('archiveList');
            const { data, error } = await _supabase.from('invoices').select('*').order('created_at', { ascending: false });
            if (error) return;

            listContainer.innerHTML = data.map(inv => {
                // معالجة ذكية للاسم والحالة
                let rawName = inv.customer_name || "عميل";
                let parts = rawName.split("||");
                
                // التأكد من وجود 4 أجزاء على الأقل (اسم، أصناف، مرتجعات، حالة)
                while(parts.length < 4) parts.push(""); 
                
                const name = parts[0];
                const isCredit = parts[3] === "CREDIT";

                let rowsHtml = "";
                try {
                    if (parts[1]) {
                        JSON.parse(parts[1]).forEach(i => {
                            rowsHtml += `<tr><td>${i.item}</td><td>${i.q}</td><td>${i.p}</td><td style="text-align:left;">${i.t} ر.س</td></tr>`;
                        });
                    }
                    if (parts[2] && parts[2] !== "" && parts[2] !== "[]") {
                        rowsHtml += `<tr><td colspan="4" style="color:red; font-weight:bold; border-top:1px solid #eee; text-align:center; padding:10px 0;">المرتجعات (-)</td></tr>`;
                        JSON.parse(parts[2]).forEach(i => {
                            rowsHtml += `<tr style="color:red; font-style:italic;"><td>${i.item}</td><td>${i.q}</td><td>${i.p}</td><td style="text-align:left;">${i.t}- ر.س</td></tr>`;
                        });
                    }
                } catch(e) {}

                return `
                    <div class="invoice-card ${isCredit ? 'is-credit' : ''}">
                        ${isCredit ? '<div class="credit-label">آجل ⏳</div>' : ''}
                        <div style="display:flex; justify-content:space-between; align-items:start;">
                            <div style="font-weight:bold; font-size:18px;">👤 ${name}</div>
                            <div style="font-size:11px; color:#999;">📅 ${new Date(inv.created_at).toLocaleString('ar-SA')}</div>
                        </div>
                        <table class="details-table">
                            <thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th style="text-align:left;">الإجمالي</th></tr></thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                        <div class="total-section">
                            <span style="font-size:11px; color:#999;">الصافي:</span><br>
                            ${inv.total_amount.toLocaleString()} ر.س
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-refund" onclick="openRefundModal('${inv.id}', \`${rawName}\`)">🔄 مرتجع</button>
                            <button class="btn ${isCredit ? 'btn-active-credit' : 'btn-credit'}" 
                                onclick="toggleCredit('${inv.id}', \`${rawName}\`, ${isCredit})">
                                ${isCredit ? '✅ تم السداد' : '⏳ آجل'}
                            </button>
                        </div>
                    </div>`;
            }).join('');
        }

        // دالة تبديل حالة الآجل (التي لم تكن تعمل)
        async function toggleCredit(id, rawName, isCurrentlyCredit) {
            let parts = rawName.split("||");
            while(parts.length < 3) parts.push(""); // تأمين المصفوفة
            
            const newStatus = isCurrentlyCredit ? "PAID" : "CREDIT";
            // نقوم بتحديث الجزء الرابع فقط
            const updatedNameField = `${parts[0]}||${parts[1]}||${parts[2]}||${newStatus}`;

            try {
                const { error } = await _supabase.from('invoices').update({ customer_name: updatedNameField }).eq('id', id);
                if (error) throw error;
                fetchInvoices(); 
            } catch (err) { alert("فشل التحديث: " + err.message); }
        }

        function openRefundModal(id, rawName) {
            activeInvoiceId = id;
            activeRawName = rawName;
            document.getElementById('refundTable').innerHTML = "";
            addRefundRow();
            document.getElementById('refundModal').style.display = 'flex';
        }

        function addRefundRow() {
            const div = document.createElement('div');
            div.className = 'refund-row';
            div.innerHTML = `<input type="text" placeholder="الصنف" class="rn"><input type="number" placeholder="كم" class="rq"><input type="number" placeholder="سعر" class="rp">`;
            document.getElementById('refundTable').appendChild(div);
        }

        async function confirmRefund() {
            const btn = document.getElementById('saveRefundBtn');
            btn.innerText = "جاري الحفظ...";
            
            let refundItems = [];
            let refundTotal = 0;
            document.querySelectorAll('.refund-row').forEach(row => {
                const q = parseFloat(row.querySelector('.rq').value) || 0;
                const p = parseFloat(row.querySelector('.rp').value) || 0;
                if(q > 0) {
                    refundItems.push({ item: row.querySelector('.rn').value || "مرتجع", q, p, t: (q*p).toFixed(2) });
                    refundTotal += (q*p);
                }
            });

            const { data: inv } = await _supabase.from('invoices').select('*').eq('id', activeInvoiceId).single();
            let parts = inv.customer_name.split("||");
            while(parts.length < 4) parts.push("");
            
            const updatedName = `${parts[0]}||${parts[1]}||${JSON.stringify(refundItems)}||${parts[3] || "PAID"}`;
            
            await _supabase.from('invoices').update({ 
                customer_name: updatedName, 
                total_amount: inv.total_amount - refundTotal 
            }).eq('id', activeInvoiceId);

            btn.innerText = "حفظ المرتجع";
            closeModal();
            fetchInvoices();
        }

        function closeModal() { document.getElementById('refundModal').style.display = 'none'; }

        window.onload = () => {
            fetchInvoices();
            _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'invoices' }, () => fetchInvoices()).subscribe();
        };
    </script>
</body>
</html>
