<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل فواتير مشاتل الناصرية </title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary-color: #12192c; 
            --accent-color: #4fac81; 
            --bg-color: #f0f2f5; 
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
            --refund-color: #e74c3c;
            --credit-color: #f39c12;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #1a1a1a; }
        .container { max-width: 800px; margin: auto; }

        .header-box { background: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; box-shadow: var(--card-shadow); position: sticky; top: 10px; z-index: 100; }
        h2 { color: var(--primary-color); margin: 0; font-size: 22px; }
        
        .invoice-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: var(--card-shadow); border: 1px solid #eee; }
        .details-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        .details-table th { color: #999; text-align: right; padding: 8px 0; border-bottom: 1px solid #eee; }
        .details-table td { padding: 10px 0; border-bottom: 1px solid #fcfcfc; }
        
        .total-section { margin-top: 15px; text-align: left; color: var(--accent-color); font-weight: bold; font-size: 20px; border-top: 1px dashed #ddd; padding-top: 10px; }

        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.3s; }
        .btn-refund { background: #fef2f2; color: var(--refund-color); border: 1px solid #fee2e2; }
        .btn-credit { background: #fffbeb; color: var(--credit-color); border: 1px solid #fef3c7; }

        /* Modal Style */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 10px; box-sizing: border-box; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        
        .refund-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .refund-row input { padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; }
        .btn-add-row { background: #12192c; color: white; width: 100%; margin: 10px 0; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save-refund { background: var(--refund-color); color: white; flex: 2; }
        .btn-close { background: #eee; color: #666; flex: 1; }
        
        .live-indicator { display: flex; align-items: center; font-size: 13px; color: var(--accent-color); font-weight: bold; }
        .dot { height: 8px; width: 8px; background-color: var(--accent-color); border-radius: 50%; margin-left: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79, 172, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(79, 172, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79, 172, 129, 0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-box">
            <h2> سجل فواتير مشاتل الناصرية </h2>
            <div class="live-indicator"><span id="statusText">متصل بالسحابة</span><span class="dot"></span>
            <div class="live-indicator"><span id="statusText">متصل الرقابه والتفتيش</span><span class="dot"></span></div>
        </div>
        <div id="archiveList"></div>
    </div>

    <div id="refundModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color: var(--refund-color); margin-top: 0;">🔄 تسجيل مسترجعات للفاتورة</h3>
            <p id="targetCustomer" style="font-weight: bold; color: #555;"></p>
            
            <div id="refundTable"></div>
            
            <button class="btn-add-row" onclick="addRefundRow()">+ إضافة صنف مسترجع</button>
            
            <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; font-size: 18px; font-weight: bold; margin-top: 10px;">
                إجمالي المرتجع: <span id="refundTotalDisplay">0.00</span> ر.س
            </div>

            <div class="modal-footer">
                <button class="btn btn-save-refund" onclick="confirmRefund()">💾 حفظ في السحابة</button>
                <button class="btn btn-close" onclick="closeModal()">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://doetvkkalypdktwiutex.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeInvoiceId = null;

        async function fetchInvoices() {
            const listContainer = document.getElementById('archiveList');
            const { data, error } = await _supabase.from('invoices').select('*').order('created_at', { ascending: false });

            if (error) return;
            
            listContainer.innerHTML = data.map(inv => {
                const parts = inv.customer_name ? inv.customer_name.split("||") : ["عميل مجهول"];
                const name = parts[0];
                let rowsHtml = "";
                
                try {
                    // الأصناف الأساسية
                    if (parts[1]) {
                        JSON.parse(parts[1]).forEach(i => {
                            rowsHtml += `<tr><td>${i.item}</td><td>${i.q}</td><td>${i.p}</td><td style="text-align:left;">${i.t} ر.س</td></tr>`;
                        });
                    }
                    // المسترجعات (إذا وجدت في الجزء الثالث من النص)
                    if (parts[2]) {
                        rowsHtml += `<tr><td colspan="4" style="color:var(--refund-color); font-weight:bold; border-top:1px solid #eee; padding-top:10px; text-align:center;">⬇ المسترجعات ⬇</td></tr>`;
                        JSON.parse(parts[2]).forEach(i => {
                            rowsHtml += `<tr style="color:var(--refund-color); font-style:italic; background:#fff5f5;"><td>${i.item} (مرتجع)</td><td>${i.q}-</td><td>${i.p}</td><td style="text-align:left;">${i.t}- ر.س</td></tr>`;
                        });
                    }
                } catch(e) { rowsHtml = "<tr><td colspan='4'>خطأ في عرض البيانات</td></tr>"; }

                return `
                    <div class="invoice-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="font-weight:bold; color:var(--primary-color); font-size:18px;">👤 ${name}</div>
                            <div style="font-size:12px; color:#999;">${new Date(inv.created_at).toLocaleString('ar-SA')}</div>
                        </div>
                        <table class="details-table">
                            <thead><tr><th>الصنف</th><th>كمية</th><th>سعر</th><th style="text-align:left;">إجمالي</th></tr></thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                        <div class="total-section">
                           <span style="font-size:12px; color:#999; font-weight:normal;">الإجمالي النهائي بعد المرتجع:</span><br>
                           ${inv.total_amount.toLocaleString('ar-SA')} ر.س
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-refund" onclick="openRefundModal('${inv.id}', '${name}')">🔄 مسترجعات</button>
                            <button class="btn btn-credit" onclick="alert('تم تمييز الفاتورة كـ آجل')">⏳ آجل</button>
                        </div>
                    </div>`;
            }).join('');
        }

        function addRefundRow() {
            const container = document.getElementById('refundTable');
            const div = document.createElement('div');
            div.className = 'refund-row';
            div.innerHTML = `
                <input type="text" class="r-name" placeholder="الصنف" style="width:45%">
                <input type="number" class="r-qty" placeholder="كمية" style="width:20%" oninput="calculateRefund()">
                <input type="number" class="r-price" placeholder="سعر" style="width:20%" oninput="calculateRefund()">
                <button onclick="this.parentElement.remove(); calculateRefund();" style="border:none; background:none; color:red; cursor:pointer; font-size:18px;">✖</button>
            `;
            container.appendChild(div);
        }

        function calculateRefund() {
            let total = 0;
            document.querySelectorAll('.refund-row').forEach(row => {
                const q = parseFloat(row.querySelector('.r-qty').value) || 0;
                const p = parseFloat(row.querySelector('.r-price').value) || 0;
                total += (q * p);
            });
            document.getElementById('refundTotalDisplay').innerText = total.toFixed(2);
            return total;
        }

        function openRefundModal(id, name) {
            activeInvoiceId = id;
            document.getElementById('targetCustomer').innerText = "العميل: " + name;
            document.getElementById('refundTable').innerHTML = "";
            document.getElementById('refundTotalDisplay').innerText = "0.00";
            addRefundRow();
            document.getElementById('refundModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('refundModal').style.display = 'none'; }

        async function confirmRefund() {
            const refundTotal = calculateRefund();
            if(refundTotal <= 0) { alert("أضف أصنافاً مسترجعة أولاً"); return; }

            const saveBtn = document.querySelector('.btn-save-refund');
            saveBtn.innerText = "جاري الحفظ...";
            saveBtn.disabled = true;

            try {
                // 1. جلب بيانات الفاتورة الحالية
                const { data: inv, error: fErr } = await _supabase.from('invoices').select('*').eq('id', activeInvoiceId).single();
                if(fErr) throw fErr;

                // 2. تجهيز مصفوفة المرتجعات
                let refundItems = [];
                document.querySelectorAll('.refund-row').forEach(row => {
                    const item = row.querySelector('.r-name').value || "صنف";
                    const q = row.querySelector('.r-qty').value || 0;
                    const p = row.querySelector('.r-price').value || 0;
                    if(q > 0) refundItems.push({item, q, p, t: (q*p).toFixed(2)});
                });

                // 3. دمج البيانات (الاسم || الأصناف الأصلية || الأصناف المرتجعة)
                const parts = inv.customer_name.split("||");
                const updatedNameField = parts[0] + "||" + parts[1] + "||" + JSON.stringify(refundItems);
                const newTotal = inv.total_amount - refundTotal;

                // 4. تحديث Supabase
                const { error: uErr } = await _supabase.from('invoices')
                    .update({ customer_name: updatedNameField, total_amount: newTotal })
                    .eq('id', activeInvoiceId);

                if(uErr) throw uErr;

                alert("تم تحديث الفاتورة بالمرتجعات بنجاح ✅");
                closeModal();
                fetchInvoices();

            } catch(err) {
                alert("حدث خطأ: " + err.message);
            } finally {
                saveBtn.innerText = "💾 حفظ في السحابة";
                saveBtn.disabled = false;
            }
        }

        function initRealtime() {
            _supabase.channel('realtime-invoices').on('postgres_changes', { event: '*', schema: 'public', table: 'invoices' }, () => fetchInvoices()).subscribe();
        }

        window.onload = () => { fetchInvoices(); initRealtime(); };
    </script>
</body>
</html>
