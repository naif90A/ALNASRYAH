<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مشاتل الناصرية - سجل آمن</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary-color: #12192c; 
            --accent-color: #4fac81; 
            --bg-color: #f0f2f5; 
            --card-shadow: 0 10px 25px rgba(0,0,0,0.05);
            --refund-color: #e74c3c; /* اللون الأحمر للمرتجع */
            --credit-color: #f39c12;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; color: #1a1a1a; }
        
        /* شاشة الحماية */
        #lockScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary-color); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        #lockScreen input {
            padding: 15px; border-radius: 12px; border: none; width: 200px;
            text-align: center; font-size: 26px; margin-top: 20px; outline: none; box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .container { max-width: 800px; margin: auto; display: none; padding-top: 70px; }

        .header-box { 
            background: white; padding: 15px 20px; border-radius: 18px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; box-shadow: var(--card-shadow); 
            position: fixed; top: 10px; width: calc(100% - 70px); max-width: 760px; z-index: 100; 
        }

        .live-tag {
            display: flex; align-items: center; gap: 8px; background: #f0fdf4; color: #166534; 
            padding: 6px 12px; border-radius: 30px; font-size: 12px; font-weight: bold; border: 1px solid #bbf7d0;
        }
        .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }

        .invoice-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 25px; box-shadow: var(--card-shadow); border: 1px solid rgba(0,0,0,0.02); }
        
        /* جدول الأصناف */
        .details-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 15px; }
        .details-table th { color: #888; text-align: right; padding: 10px; border-bottom: 1px solid #eee; }
        .details-table td { padding: 12px 10px; border-bottom: 1px solid #fcfcfc; }

        /* صفوف المرتجع باللون الأحمر */
        .refund-row { color: var(--refund-color) !important; background-color: #fffafa; font-weight: 500; }
        .refund-badge { background: var(--refund-color); color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-right: 5px; }

        .total-section { 
            margin-top: 15px; text-align: left; color: var(--accent-color); 
            font-weight: bold; font-size: 24px; border-top: 2px dashed #f0f0f0; padding-top: 15px; 
        }

        .action-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-refund { background: #fef2f2; color: var(--refund-color); border: 1px solid #fee2e2; }
        .btn-credit { background: #fffbeb; color: var(--credit-color); border: 1px solid #fef3c7; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 90%; max-width: 450px; }
    </style>
</head>
<body>

    <div id="lockScreen">
        <h2>🔒 نظام الناصرية</h2>
        <input type="password" id="pinInput" placeholder="الرمز السري" oninput="checkPin(this.value)">
    </div>

    <div class="container" id="appContent">
        <div class="header-box">
            <h3 style="margin:0;">سجل الفواتير</h3>
            <div id="presenceDisplay" class="live-tag">
                <span class="dot"></span>
                أونلاين: <span id="deviceCount">1</span>
            </div>
        </div>
        <div id="invoiceList"></div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://doetvkkalypdktwiutex.supabase.co', 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir');
        const SECRET_PIN = "1234";

        function checkPin(val) {
            if(val === SECRET_PIN) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                initApp();
            }
        }

        async function initApp() {
            loadInvoices();
            setupPresence();
            _supabase.channel('db-ui').on('postgres_changes', { event: '*', schema: 'public', table: 'invoices' }, () => loadInvoices()).subscribe();
        }

        async function setupPresence() {
            const channel = _supabase.channel('presence-layer', { config: { presence: { key: 'user' } } });
            channel.on('presence', { event: 'sync' }, () => {
                const count = Object.keys(channel.presenceState()).length;
                document.getElementById('deviceCount').innerText = count;
                document.getElementById('presenceDisplay').style.background = count > 1 ? "#fee2e2" : "#f0fdf4";
            }).subscribe(async (s) => { if(s === 'SUBSCRIBED') await channel.track({ active: true }); });
        }

        async function loadInvoices() {
            const { data, error } = await _supabase.from('invoices').select('*').order('created_at', { ascending: false });
            if (error) return;

            document.getElementById('invoiceList').innerHTML = data.map(inv => {
                const parts = inv.customer_name ? inv.customer_name.split("||") : ["عميل مجهول"];
                const name = parts[0];
                let tableRows = "";
                
                // 1. عرض الأصناف المباعة (الأسود)
                try {
                    if (parts[1]) {
                        JSON.parse(parts[1]).forEach(item => {
                            tableRows += `<tr><td>${item.item}</td><td>${item.q}</td><td>${item.p}</td><td style="text-align:left;">${item.t} ر.س</td></tr>`;
                        });
                    }
                    // 2. عرض المرتجعات (الأحمر) تحت الفاتورة مباشرة
                    if (parts[2]) {
                        JSON.parse(parts[2]).forEach(item => {
                            tableRows += `
                            <tr class="refund-row">
                                <td><span class="refund-badge">مرتجع</span> ${item.item}</td>
                                <td>${item.q}-</td>
                                <td>${item.p}</td>
                                <td style="text-align:left;">${item.t}- ر.س</td>
                            </tr>`;
                        });
                    }
                } catch(e) { tableRows = "<tr><td colspan='4'>خطأ في عرض البيانات</td></tr>"; }

                return `
                    <div class="invoice-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-weight:bold; font-size:18px; color:var(--primary-color);">👤 ${name}</span>
                            <span style="font-size:11px; color:#aaa;">${new Date(inv.created_at).toLocaleString('ar-SA')}</span>
                        </div>
                        <table class="details-table">
                            <thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th style="text-align:left;">الإجمالي</th></tr></thead>
                            <tbody>${tableRows}</tbody>
                        </table>
                        <div class="total-section">
                            <span style="font-size:12px; color:#999; font-weight:normal;">الإجمالي النهائي:</span><br>
                            ${inv.total_amount.toLocaleString()} ر.س
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-refund" onclick="alert('واجهة تسجيل المرتجع...')">🔄 مسترجع</button>
                            <button class="btn btn-credit" onclick="alert('تم وضع علامة آجل')">⏳ آجل</button>
                        </div>
                    </div>`;
            }).join('');
        }
    </script>
</body>
</html>
