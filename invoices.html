<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل فواتير الناصرية | النظام الإداري</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #10b981;
            --pending: #f59e0b;
            --returned: #ef4444;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            direction: rtl;
        }

        .container { max-width: 900px; margin: auto; }

        .header {
            background: var(--primary);
            color: white;
            padding: 25px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .invoice-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-right: 6px solid #e2e8f0;
            transition: 0.3s ease;
        }

        .card-pending { border-right-color: var(--pending); background: #fffbeb; }
        .card-returned { border-right-color: var(--returned); background: #fef2f2; }

        .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .client-info { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        .date { color: #64748b; font-size: 0.9rem; }

        .status-badge {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-returned { background: #fee2e2; color: #991b1b; }

        .total { font-size: 1.5rem; color: var(--accent); font-weight: 800; margin: 15px 0; }

        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .btn-p { background: var(--pending); color: white; }
        .btn-r { background: var(--returned); color: white; }
        .btn-reset { background: #e2e8f0; color: #475569; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .loading-screen { text-align: center; padding: 50px; color: #64748b; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">📊 سجل العمليات السحابي</h2>
        <div id="conn-status" style="font-size: 0.8rem; opacity: 0.8;">متصل بالسحابة الآمنة</div>
    </div>

    <div id="main-content">
        <div class="loading-screen">جاري جلب البيانات من Supabase...</div>
    </div>
</div>

<script>
    // التعديل هنا: تأكد أن الرابط والمفتاح صحيحين من لوحة تحكم Supabase لديك
    const SB_URL = 'https://doetvkkaly...supabase.co'; // ضع الرابط الحقيقي الذي نسخته من الإعدادات
    const PUBLIC_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // ضع مفتاح Anon Key الحقيقي

    // تصحيح: تم تغيير PROJECT_URL إلى SB_URL ليتطابق مع المتغير في الأعلى
    const _supabase = supabase.createClient(SB_URL, PUBLIC_KEY);

    async function loadInvoices() {
        const content = document.getElementById('main-content');
        try {
            const { data, error } = await _supabase
                .from('invoices')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (!data || data.length === 0) {
                content.
innerHTML = '<div class="loading-screen">لا توجد فواتير مسجلة حالياً.</div>';
                return;
            }

            content.innerHTML = data.map(inv => {
                // معالجة الاسم إذا كان يحتوي على بيانات إضافية
                const name = inv.customer_name ? inv.customer_name.split("||")[0] : "عميل بدون اسم";
                const status = inv.status || "";
                
                let cardClass = "";
                let badge = "";
                if(status === "آجل") {
                    cardClass = "card-pending";
                    badge = '<span class="status-badge badge-pending">⚠️ آجل</span>';
                } else if(status === "مسترد") {
                    cardClass = "card-returned";
                    badge = '<span class="status-badge badge-returned">🔄 مسترد</span>';
                }

                return `
                    <div class="invoice-card ${cardClass}">
                        <div class="card-meta">
                            <div class="client-info">👤 ${name} ${badge}</div>
                            <div class="date">📅 ${new Date(inv.created_at).toLocaleDateString('ar-SA')}</div>
                        </div>
                        <div class="total">${inv.total_amount ? inv.total_amount.toLocaleString() : 0} ر.س</div>
                        <div class="actions">
                            <button class="btn btn-p" onclick="updateStatus('${inv.id}', 'آجل')">تحديد آجل</button>
                            <button class="btn btn-r" onclick="updateStatus('${inv.id}', 'مسترد')">تحديد مسترد</button>
                            <button class="btn btn-reset" onclick="updateStatus('${inv.id}', '')">إلغاء الحالة</button>
                        </div>
                    </div>
                `;
            }).join('');

        } catch (err) {
            content.innerHTML = `<div style="color:red; text-align:center; padding:20px;">
                خطأ في الاتصال: ${err.message}<br>
                <small>تأكد من صحة الرابط (SB_URL) ومفتاح (PUBLIC_KEY) في الكود.</small>
            </div>`;
        }
    }

    async function updateStatus(id, newStatus) {
        const { error } = await _supabase
            .from('invoices')
            .update({ status: newStatus })
            .eq('id', id);

        if (error) {
            alert("فشل التحديث: " + error.message);
        } else {
            loadInvoices(); 
        }
    }

    window.onload = loadInvoices;
</script>
</body>
</html>
