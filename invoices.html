<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة فواتير الناصرية 📊</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary-color: #1a202c; 
            --accent-color: #2f855a; 
            --bg-color: #f7fafc; 
            --card-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            --refund-color: #c53030;
            --credit-bg: #fffcf0;
            --credit-border: #f6ad55;
            --credit-text: #dd6b20;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #2d3748; }
        .container { max-width: 900px; margin: auto; }

        .header-box { 
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%); 
            padding: 25px; border-radius: 12px; display: flex; 
            justify-content: space-between; align-items: center; 
            margin-bottom: 30px; box-shadow: var(--card-shadow); color: white;
        }

        .invoice-card { 
            background: white; padding: 25px; border-radius: 12px; 
            margin-bottom: 25px; box-shadow: var(--card-shadow); 
            border-right: 6px solid #e2e8f0; position: relative; overflow: hidden;
        }
        
        .invoice-card.is-credit {
            background-color: var(--credit-bg);
            border-right-color: var(--credit-border);
            border: 2px solid var(--credit-border);
        }

        .credit-badge {
            position: absolute; top: 15px; left: -30px;
            background: var(--credit-border); color: white;
            padding: 5px 40px; transform: rotate(-45deg);
            font-size: 12px; font-weight: bold;
        }

        .details-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .details-table th { color: #718096; text-align: right; padding: 10px 5px; border-bottom: 2px solid #edf2f7; font-size: 13px; }
        .details-table td { padding: 12px 5px; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        
        .total-section { margin-top: 20px; text-align: left; padding-top: 15px; border-top: 2px solid #edf2f7; }
        .total-amount { font-size: 24px; font-weight: 800; color: var(--primary-color); }

        .action-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-refund { background: #fef2f2; color: var(--refund-color); border: 1px solid #feb2b2; }
        .btn-credit { background: #fffaf0; color: var(--credit-text); border: 1px solid #fbd38d; }
        .btn-paid { background: #48bb78; color: white; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 500px; }
        .refund-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .refund-row input { padding: 8px; border-radius: 5px; border: 1px solid #ddd; width: 30%; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-box">
            <div><h2>نظام الرقابة المحاسبية 📊</h2><small>إدارة الفواتير والذمم</small></div>
            <div id="status">متصل ✅</div>
        </div>
        <div id="archiveList"></div>
    </div>

    <div id="refundModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color: var(--refund-color);">🔄 إضافة مسترجعات</h3>
            <div id="refundTable"></div>
            <button onclick="addRefundRow()" style="margin: 10px 0; width: 100%; padding: 10px; cursor: pointer;">+ صنف جديد</button>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-refund" id="confirmRefundBtn" onclick="processRefund()">حفظ وخصم</button>
                <button class="btn" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://doetvkkalypdktwiutex.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentInvId = null;

        // دالة لجلب البيانات ومعالجتها بأمان
        function parseInvoiceData(fullName) {
            const parts = fullName ? fullName.split("||") : [];
            return {
                name: parts[0] || "عميل مجهول",
                items: parts[1] ? JSON.parse(parts[1]) : [],
                refunds: parts[2] ? JSON.parse(parts[2]) : [],
                status: parts[3] || "PAID"
            };
        }

        async function fetchInvoices() {
            const container = document.getElementById('archiveList');
            const { data, error } = await _supabase.from('invoices').select('*').order('created_at', { ascending: false });
            if (error) return;

            container.innerHTML = data.map(inv => {
                const info = parseInvoiceData(inv.customer_name);
                const isCredit = info.status === "CREDIT";
                
                let rowsHtml = info.items.map(i => `<tr><td>${i.item}</td><td>${i.q}</td><td>${i.p}</td><td style="text-align:left;">${i.t} ر.س</td></tr>`).join('');
                
                if (info.refunds.length > 0) {
                    rowsHtml += `<tr><td colspan="4" style="color:red; font-weight:bold; border-top:1px solid #eee; text-align:center; padding:10px 0;">المسترجعات</td></tr>`;
                    rowsHtml += info.refunds.map(i => `<tr style="color:red; font-style:italic;"><td>${i.item} (-)</td><td>${i.q}</td><td>${i.p}</td><td style="text-align:left;">${i.t}- ر.س</td></tr>`).join('');
                }

                return `
                    <div class="invoice-card ${isCredit ? 'is-credit' : ''}">
                        ${isCredit ? '<div class="credit-badge">آجل</div>' : ''}
                        <div style="display:flex; justify-content:space-between;">
                            <div style="font-weight:bold; font-size:18px;">👤 ${info.name}</div>
                            <div style="font-size:12px; color:#999;">${new Date(inv.created_at).toLocaleDateString('ar-SA')}</div>
                        </div>
                        <table class="details-table">
                            <thead><tr><th>الصنف</th><th>كمية</th><th>سعر</th><th style="text-align:left;">إجمالي</th></tr></thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                        <div class="total-section">
                            <div style="font-size:12px;">الإجمالي الصافي:</div>
                            <div class="total-amount">${inv.total_amount.toLocaleString()} ر.س</div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-refund" onclick="openModal('${inv.id}')">🔄 مرتجع</button>
                            <button class="btn ${isCredit ? 'btn-paid' : 'btn-credit'}" onclick="toggleStatus('${inv.id}', \`${inv.customer_name}\`, '${info.status}')">
                                ${isCredit ? '✅ تم التحصيل' : '⏳ تحويل لآجل'}
                            </button>
                        </div>
                    </div>`;
            }).join('');
        }

        async function toggleStatus(id, fullName, currentStatus) {
            const info = parseInvoiceData(fullName);
            const newStatus = currentStatus === "CREDIT" ? "PAID" : "CREDIT";
            const updatedField = `${info.name}||${JSON.stringify(info.items)}||${JSON.stringify(info.refunds)}||${newStatus}`;
            
            await _supabase.from('invoices').update({ customer_name: updatedField }).eq('id', id);
            fetchInvoices();
        }

        function openModal(id) {
            currentInvId = id;
            document.getElementById('refundTable').innerHTML = "";
            addRefundRow();
            document.getElementById('refundModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('refundModal').style.display = 'none'; }

        function addRefundRow() {
            const div = document.createElement('div');
            div.className = 'refund-row';
            div.innerHTML = `<input type="text" placeholder="الصنف" class="rn"><input type="number" placeholder="كم" class="rq"><input type="number" placeholder="سعر" class="rp">`;
            document.getElementById('refundTable').appendChild(div);
        }

        async function processRefund() {
            const btn = document.getElementById('confirmRefundBtn');
            btn.disabled = true;
            btn.innerText = "جاري الحفظ...";

            const { data: inv } = await _supabase.from('invoices').select('*').eq('id', currentInvId).single();
            const info = parseInvoiceData(inv.customer_name);

            let newRefunds = [];
            let refundTotal = 0;
            document.querySelectorAll('.refund-row').forEach(row => {
                const q = parseFloat(row.querySelector('.rq').value) || 0;
                const p = parseFloat(row.querySelector('.rp').value) || 0;
                const n = row.querySelector('.rn').value || "مرتجع";
                if(q > 0) {
                    newRefunds.push({ item: n, q, p, t: (q*p).toFixed(2) });
                    refundTotal += (q*p);
                }
            });

            const combinedRefunds = info.refunds.concat(newRefunds);
            const updatedField = `${info.name}||${JSON.stringify(info.items)}||${JSON.stringify(combinedRefunds)}||${info.status}`;

            await _supabase.from('invoices').update({ 
                customer_name: updatedField, 
                total_amount: inv.total_amount - refundTotal 
            }).eq('id', currentInvId);

            btn.disabled = false;
            btn.innerText = "حفظ وخصم";
            closeModal();
            fetchInvoices();
        }

        window.onload = () => {
            fetchInvoices();
            _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'invoices' }, () => fetchInvoices()).subscribe();
        };
    </script>
</body>
</html>
