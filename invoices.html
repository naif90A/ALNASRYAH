<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة مشاتل الناصرية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f1e2e;
            --accent: #4fac81;
            --accent-light: #d1fae5;
            --danger: #e74c3c;
            --bg: #eef1f6;
            --card: #ffffff;
            --text: #1a202c;
            --muted: #94a3b8;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', 'Hind Siliguri', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 40px;
        }

        /* الهيدر */
        .app-header {
            background: var(--primary);
            border-radius: 20px;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .app-title { color: white; font-size: 17px; font-weight: 700; line-height: 1.4; }
        .app-title small { display: block; color: var(--accent); font-size: 13px; font-family: 'Hind Siliguri', sans-serif; font-weight: 400; }
        .lang-toggle {
            display: flex;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .lang-btn {
            padding: 7px 14px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Cairo', sans-serif;
        }
        .lang-btn.active { background: var(--accent); color: white; border-radius: 8px; }

        /* بطاقة */
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 16px rgba(15,30,46,0.06);
        }

        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-label .bn { font-family: 'Hind Siliguri', sans-serif; font-weight: 400; color: #b0bec5; font-size: 11px; }

        /* حقل الاسم */
        .name-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            font-family: 'Cairo', 'Hind Siliguri', sans-serif;
            color: var(--text);
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
            background: #f8fafc;
        }
        .name-input:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 4px rgba(79,172,129,0.1); }
        .name-input::placeholder { color: var(--muted); }

        /* رأس جدول الأصناف */
        .items-header {
            display: grid;
            grid-template-columns: 1fr 70px 80px 70px 36px;
            gap: 8px;
            padding: 0 4px;
            margin-bottom: 8px;
        }
        .items-header span {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-align: center;
        }
        .items-header span:first-child { text-align: right; }
        .items-header .bn { display: block; font-family: 'Hind Siliguri', sans-serif; font-weight: 400; font-size: 10px; color: #b0bec5; }

        /* صف الصنف */
        .item-row {
            display: grid;
            grid-template-columns: 1fr 70px 80px 70px 36px;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
            animation: rowIn 0.25s ease;
        }
        @keyframes rowIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        .item-row input {
            padding: 10px 10px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Cairo', 'Hind Siliguri', sans-serif;
            color: var(--text);
            outline: none;
            width: 100%;
            transition: border 0.2s;
            background: #f8fafc;
            text-align: center;
        }
        .item-row input:first-child { text-align: right; }
        .item-row input:focus { border-color: var(--accent); background: white; }
        .item-row input::placeholder { color: var(--muted); font-size: 12px; }
        .item-row input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

        .item-total-display {
            background: var(--accent-light);
            color: #166534;
            border-radius: 10px;
            padding: 10px 6px;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
        }

        .remove-row-btn {
            width: 36px; height: 36px;
            border: none; border-radius: 9px;
            background: #fff0f0; color: var(--danger);
            font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .remove-row-btn:hover { background: #fed7d7; }

        /* زر إضافة صنف */
        .btn-add-row {
            width: 100%;
            padding: 11px;
            border: 1.5px dashed var(--border);
            border-radius: 12px;
            background: #f8fafc;
            color: var(--muted);
            font-family: 'Cairo', 'Hind Siliguri', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
            transition: all 0.2s;
        }
        .btn-add-row:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

        /* الإجمالي */
        .total-card {
            background: var(--primary);
            border-radius: 20px;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-label { color: rgba(255,255,255,0.7); font-size: 14px; }
        .total-label .bn { display: block; font-family: 'Hind Siliguri', sans-serif; font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
        .total-amount { font-size: 34px; font-weight: 900; color: var(--accent); letter-spacing: -1px; }
        .total-amount small { font-size: 15px; font-weight: 600; margin-right: 4px; color: rgba(255,255,255,0.6); }

        /* زر الحفظ */
        .btn-save {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: var(--accent);
            color: white;
            font-family: 'Cairo', 'Hind Siliguri', sans-serif;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(79,172,129,0.35);
        }
        .btn-save:hover { background: #3a9b6f; }
        .btn-save:active { transform: scale(0.98); }
        .btn-save:disabled { opacity: 0.6; cursor: default; transform: none; }
        .btn-save .bn { font-family: 'Hind Siliguri', sans-serif; font-size: 14px; opacity: 0.85; }

        /* Toast */
        #toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--primary); color: white;
            padding: 12px 22px; border-radius: 14px;
            font-size: 14px; font-weight: 600; z-index: 9999;
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            font-family: 'Cairo', 'Hind Siliguri', sans-serif;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="container">

    <!-- الهيدر -->
    <div class="app-header">
        <div class="app-title">
            🌱 مشاتل الناصرية
            <small id="subTitle">نظام الفواتير</small>
        </div>
        <div class="lang-toggle">
            <button class="lang-btn active" id="btnAr" onclick="setLang('ar')">عربي</button>
            <button class="lang-btn" id="btnBn" onclick="setLang('bn')">বাংলা</button>
        </div>
    </div>

    <!-- اسم العميل -->
    <div class="card">
        <div class="section-label">
            <span id="lbl_customer">👤 اسم العميل</span>
            <span class="bn" id="lbl_customer_bn">গ্রাহকের নাম</span>
        </div>
        <input type="text" class="name-input" id="customerName" placeholder="اكتب الاسم هنا...">
    </div>

    <!-- الأصناف -->
    <div class="card">
        <div class="section-label">
            <span id="lbl_items">🌿 الأصناف</span>
            <span class="bn" id="lbl_items_bn">পণ্যের তালিকা</span>
        </div>

        <div class="items-header">
            <span><span id="col_item">الصنف</span><span class="bn">পণ্য</span></span>
            <span><span id="col_qty">كمية</span><span class="bn">পরিমাণ</span></span>
            <span><span id="col_price">السعر</span><span class="bn">মূল্য</span></span>
            <span><span id="col_total">الإجمالي</span><span class="bn">মোট</span></span>
            <span></span>
        </div>

        <div id="itemsList"></div>

        <button class="btn-add-row" onclick="addRow()" id="btn_add">
            ➕ <span id="btn_add_text">إضافة صنف</span> <span style="font-family:'Hind Siliguri',sans-serif; font-size:12px; opacity:0.7;" id="btn_add_bn">নতুন পণ্য</span>
        </button>
    </div>

    <!-- الإجمالي -->
    <div class="total-card">
        <div class="total-label">
            <span id="lbl_grand">المجموع الكلي</span>
            <span class="bn">সর্বমোট</span>
        </div>
        <div class="total-amount">
            <small>ر.س</small><span id="grandTotal">0.00</span>
        </div>
    </div>

    <!-- زر الحفظ -->
    <button class="btn-save" id="saveBtn" onclick="saveToCloud()">
        💾 <span id="btn_save_text">حفظ في السحابة</span>
        <span class="bn" id="btn_save_bn">সংরক্ষণ করুন</span>
    </button>

</div>

<div id="toast"></div>

<script>
    const _supabase = supabase.createClient(
        'https://doetvkkalypdktwiutex.supabase.co',
        'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir'
    );

    // ===== اللغة =====
    let currentLang = 'ar';

    const translations = {
        ar: {
            subTitle: 'نظام الفواتير',
            lbl_customer: '👤 اسم العميل',
            customerPlaceholder: 'اكتب الاسم هنا...',
            lbl_items: '🌿 الأصناف',
            col_item: 'الصنف', col_qty: 'كمية', col_price: 'السعر', col_total: 'الإجمالي',
            btn_add_text: 'إضافة صنف',
            lbl_grand: 'المجموع الكلي',
            btn_save_text: 'حفظ في السحابة',
            ph_item: 'اسم الصنف', ph_qty: 'كمية', ph_price: 'سعر',
            toast_empty: '⚠️ أضف صنفاً واحداً على الأقل',
            toast_success: '✅ تم الحفظ في السحابة بنجاح',
            toast_fail: '❌ فشل الحفظ، تحقق من الاتصال',
            saving: '⏳ جارٍ الحفظ...',
        },
        bn: {
            subTitle: 'চালান সিস্টেম',
            lbl_customer: '👤 গ্রাহকের নাম',
            customerPlaceholder: 'এখানে নাম লিখুন...',
            lbl_items: '🌿 পণ্যের তালিকা',
            col_item: 'পণ্য', col_qty: 'পরিমাণ', col_price: 'মূল্য', col_total: 'মোট',
            btn_add_text: 'নতুন পণ্য যোগ',
            lbl_grand: 'সর্বমোট',
            btn_save_text: 'সংরক্ষণ করুন',
            ph_item: 'পণ্যের নাম', ph_qty: 'পরিমাণ', ph_price: 'মূল্য',
            toast_empty: '⚠️ অন্তত একটি পণ্য যোগ করুন',
            toast_success: '✅ সফলভাবে সংরক্ষিত হয়েছে',
            toast_fail: '❌ সংরক্ষণ ব্যর্থ, সংযোগ পরীক্ষা করুন',
            saving: '⏳ সংরক্ষণ হচ্ছে...',
        }
    };

    function setLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        const isAr = lang === 'ar';

        document.documentElement.setAttribute('dir', isAr ? 'rtl' : 'ltr');
        document.documentElement.setAttribute('lang', isAr ? 'ar' : 'bn');

        document.getElementById('btnAr').classList.toggle('active', isAr);
        document.getElementById('btnBn').classList.toggle('active', !isAr);

        document.getElementById('subTitle').textContent = t.subTitle;
        document.getElementById('lbl_customer').textContent = t.lbl_customer;
        document.getElementById('customerName').placeholder = t.customerPlaceholder;
        document.getElementById('lbl_items').textContent = t.lbl_items;
        document.getElementById('col_item').textContent = t.col_item;
        document.getElementById('col_qty').textContent = t.col_qty;
        document.getElementById('col_price').textContent = t.col_price;
        document.getElementById('col_total').textContent = t.col_total;
        document.getElementById('btn_add_text').textContent = t.btn_add_text;
        document.getElementById('btn_add_bn').style.display = isAr ? 'inline' : 'none';
        document.getElementById('lbl_grand').textContent = t.lbl_grand;
        document.getElementById('btn_save_text').textContent = t.btn_save_text;
        document.getElementById('btn_save_bn').style.display = isAr ? 'inline' : 'none';

        // تحديث placeholders الحقول الموجودة
        document.querySelectorAll('#itemsList .item-row').forEach(row => {
            row.querySelector('.item-name').placeholder = t.ph_item;
            row.querySelector('.qty').placeholder = t.ph_qty;
            row.querySelector('.price').placeholder = t.ph_price;
        });

        // الخط
        document.body.style.fontFamily = isAr
            ? "'Cairo', 'Hind Siliguri', sans-serif"
            : "'Hind Siliguri', 'Cairo', sans-serif";
    }

    // ===== الأصناف =====
    function addRow() {
        const t = translations[currentLang];
        const list = document.getElementById('itemsList');
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
            <input type="text" class="item-name" placeholder="${t.ph_item}">
            <input type="number" class="qty" placeholder="${t.ph_qty}" min="0" oninput="calculate()">
            <input type="number" class="price" placeholder="${t.ph_price}" min="0" oninput="calculate()">
            <div class="item-total-display">0</div>
            <button class="remove-row-btn" onclick="removeRow(this)">✕</button>
        `;
        list.appendChild(row);
    }

    function removeRow(btn) {
        const rows = document.querySelectorAll('#itemsList .item-row');
        if (rows.length > 1) { btn.closest('.item-row').remove(); calculate(); }
    }

    function calculate() {
        let total = 0;
        document.querySelectorAll('#itemsList .item-row').forEach(row => {
            const q = parseFloat(row.querySelector('.qty').value) || 0;
            const p = parseFloat(row.querySelector('.price').value) || 0;
            const t = q * p;
            row.querySelector('.item-total-display').textContent = t.toFixed(2);
            total += t;
        });
        document.getElementById('grandTotal').textContent = total.toFixed(2);
        return total;
    }

    // ===== الحفظ =====
    async function saveToCloud() {
        const t = translations[currentLang];
        const name = document.getElementById('customerName').value.trim() || "عميل بدون اسم";
        const total = calculate();
        let itemsData = [];

        document.querySelectorAll('#itemsList .item-row').forEach(row => {
            const item = row.querySelector('.item-name').value.trim() || "صنف";
            const q = parseFloat(row.querySelector('.qty').value) || 0;
            const p = parseFloat(row.querySelector('.price').value) || 0;
            if (q > 0) itemsData.push({ item, q, p, t: (q*p).toFixed(2) });
        });

        if (!itemsData.length) { showToast(t.toast_empty); return; }

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerHTML = `${t.saving}`;

        try {
            const { error } = await _supabase.from('invoices').insert([{
                customer_name: name + "||" + JSON.stringify(itemsData),
                total_amount: total
            }]);
            if (error) throw error;
            showToast(t.toast_success);
            document.getElementById('customerName').value = '';
            document.getElementById('itemsList').innerHTML = '';
            addRow(); calculate();
        } catch(e) {
            showToast(t.toast_fail);
        } finally {
            btn.disabled = false;
            btn.innerHTML = `💾 <span id="btn_save_text">${t.btn_save_text}</span>`;
        }
    }

    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3500);
    }

    // تهيئة
    addRow();
</script>
</body>
</html>
