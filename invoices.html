<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل فواتير مشاتل الناصرية - نظام ذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #1e293b;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --glass: rgba(255, 255, 255, 0.85);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        /* خلفية حية متحركة */
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--primary);
            min-height: 100vh;
            background: linear-gradient(-45deg, #f0f9ff, #e0f2fe, #f1f5f9, #ecfdf5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { max-width: 850px; margin: auto; }

        /* الهيدر الزجاجي المتطور */
        .header-box { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: sticky;
            top: 20px;
            z-index: 1000;
        }

        h2 { margin: 0; font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }

        /* مؤشر الحالة الحي */
        .live-indicator {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .normal-mode { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .alert-mode { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; animation: pulse-shake 0.5s infinite; }

        .dot { height: 10px; width: 10px; border-radius: 50%; margin-left: 10px; }
        .normal-mode .dot { background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse-green 2s infinite; }
        .alert-mode .dot { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

        /* بطاقة الفاتورة بتأثير Glassmorphism */
        .invoice-card { 
            background: var(--glass);
            backdrop-filter: blur(8px);
            padding: 25px;
            border-radius: 24px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideIn 0.5s ease-out forwards;
        }

        .invoice-card:hover { transform: translateY(-5px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }

        /* الجداول */
        .details-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 15px; }
        .details-table th { color: #64748b; font-size: 13px; text-align: right; padding: 10px; }
        .details-table td { background: rgba(248, 250, 252, 0.5); padding: 15px 10px; border-radius: 10px; font-size: 15px; }

        /* الأزرار المطورة */
        .action-buttons { display: flex; gap: 15px; margin-top: 25px; }
        .btn { 
            flex: 1; padding: 14px; border: none; border-radius: 16px; 
            font-weight: 700; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; gap: 8px; transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-refund { background: white; color: var(--danger); border: 1px solid #fee2e2; }
        .btn-refund:hover { background: var(--danger); color: white; transform: scale(1.02); }

        .btn-credit { background: white; color: var(--warning); border: 1px solid #fef3c7; }
        .btn-credit:hover { background: var(--warning); color: white; transform: scale(1.02); }

        .total-section { 
            margin-top: 20px; padding-top: 20px; border-top: 2px dashed #e2e8f0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .total-amount { color: var(--accent); font-size: 26px; font-weight: 900; }

        /* المودال - نافذة المرتجع */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 15px; }
        .modal-content { background: white; padding: 30px; border-radius: 30px; width: 100%; max-width: 550px; max-height: 85vh; overflow-y: auto; }

        /* أنيميشن */
        @keyframes pulse-green { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes pulse-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* تخصيص السكرول بار */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-box">
            <h2>📦 سجل الناصرية <span style="font-weight: 300; color: #64748b;">الذكي</span></h2>
            <div id="liveIndicator" class="live-indicator normal-mode">
                <span id="statusText">اتصال آمن</span>
                <span class="dot"></span>
            </div>
        </div>
        <div id="archiveList"></div>
    </div>

    <div id="refundModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color: var(--danger); margin-bottom: 5px;">🔄 معالجة مرتجعات</h3>
            <p id="targetCustomer" style="color: #64748b; margin-bottom: 25px;"></p>
            <div id="refundTable"></div>
            <button class="btn" style="background:#f1f5f9; width:100%; margin:15px 0;" onclick="addRefundRow()">+ إضافة صنف جديد</button>
            <div style="background: #f8fafc; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px;">
                <span style="font-size:14px; color:#64748b;">إجمالي المسترجع:</span><br>
                <span id="refundTotalDisplay" style="font-size:28px; font-weight:900; color:var(--danger);">0.00</span> ر.س
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:var(--primary); color:white; flex:2;" onclick="confirmRefund()">💾 حفظ البيانات</button>
                <button class="btn" style="background:#eee; flex:1;" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://doetvkkalypdktwiutex.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeInvoiceId = null;

        // --- نظام الرقابة المتطور ---
        function startStatusLoop() {
            const statusText = document.getElementById('statusText');
            const indicatorDiv = document.getElementById('liveIndicator');

            function triggerInspection() {
                indicatorDiv.classList.replace('normal-mode', 'alert-mode');
                statusText.innerText = "⚠️ دخول الرقابة والتفتيش...";

                const inspectionDuration = Math.floor(Math.random() * 120000) + 60000; // 1-3 دقائق
                
                setTimeout(() => {
                    indicatorDiv.classList.replace('alert-mode', 'normal-mode');
                    statusText.innerText = "اتصال آمن";
                    
                    const nextInspection = Math.floor(Math.random() * (12*3600000 - 600000)) + 600000;
                    setTimeout(triggerInspection, nextInspection);
                }, inspectionDuration);
            }
            // أول ظهور بعد 2-5 دقائق
            setTimeout(triggerInspection, Math.floor(Math.random() * 180000) + 120000);
        }

        // --- جلب البيانات ---
        async function fetchInvoices() {
            const listContainer = document.getElementById('archiveList');
            const { data, error } = await _supabase.from('invoices').select('*').order('created_at', { ascending: false });

            if (error) return;
            
            listContainer.innerHTML = data.map((inv, idx) => {
                const parts = inv.customer_name ? inv.customer_name.split("||") : ["عميل مجهول"];
                const name = parts[0];
                let rowsHtml = "";
                
                try {
                    if (parts[1]) {
                        JSON.parse(parts[1]).forEach(i => {
                            rowsHtml += `<tr><td>${i.item}</td><td>${i.q}</td><td>${i.p}</td><td style="text-align:left;">${i.t} ر.س</td></tr>`;
                        });
                    }
                    if (parts[2]) {
                        rowsHtml += `<tr><td colspan="4" style="text-align:center; padding-top:15px;"><span style="background:#fee2e2; color:#b91c1c; padding:4px 12px; border-radius:50px; font-size:11px; font-weight:bold;">قائمة المرتجعات</span></td></tr>`;
                        JSON.parse(parts[2]).forEach(i => {
                            rowsHtml += `<tr style="color:#ef4444; font-style:italic;"><td>${i.item} (مرتجع)</td><td>${i.q}-</td><td>${i.p}</td><td style="text-align:left;">${i.t}- ر.س</td></tr>`;
                        });
                    }
                } catch(e) { rowsHtml = "<tr><td colspan='4'>حدث خطأ في عرض الأصناف</td></tr>"; }

                return `
                    <div class="invoice-card" style="animation-delay: ${idx * 0.1}s">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                            <div>
                                <span style="font-size:12px; color:#64748b; display:block;">اسم العميل</span>
                                <strong style="font-size:18px;">👤 ${name}</strong>
                            </div>
                            <div style="text-align:left;">
                                <span style="font-size:11px; color:#94a3b8;">${new Date(inv.created_at).toLocaleString('ar-SA')}</span>
                            </div>
                        </div>
                        <table class="details-table">
                            <thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th style="text-align:left;">الإجمالي</th></tr></thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                        <div class="total-section">
                           <span style="font-size:14px; font-weight:bold; color:#64748b;">إجمالي الفاتورة الصافي</span>
                           <span class="total-amount">${inv.total_amount.toLocaleString('ar-SA')} <small style="font-size:14px;">ر.س</small></span>
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-refund" onclick="openRefundModal('${inv.id}', '${name}')">🔄 مرتجع</button>
                            <button class="btn btn-credit" onclick="alert('تم تفعيل التتبع الآجل')">⏳ آجل</button>
                        </div>
                    </div>`;
            }).join('');
        }

        // --- المرتجعات ووظائفها ---
        function addRefundRow() {
            const container = document.getElementById('refundTable');
            const div = document.createElement('div');
            div.style = "display:flex; gap:8px; margin-bottom:10px;";
            div.innerHTML = `
                <input type="text" class="r-name" placeholder="الصنف" style="flex:2; padding:12px; border-radius:12px; border:1px solid #e2e8f0;">
                <input type="number" class="r-qty" placeholder="الكمية" style="flex:1; padding:12px; border-radius:12px; border:1px solid #e2e8f0;" oninput="calculateRefund()">
                <input type="number" class="r-price" placeholder="السعر" style="flex:1; padding:12px; border-radius:12px; border:1px solid #e2e8f0;" oninput="calculateRefund()">
                <button onclick="this.parentElement.remove(); calculateRefund();" style="color:red; background:none; border:none; font-size:20px; cursor:pointer;">×</button>
            `;
            container.appendChild(div);
        }

        function calculateRefund() {
            let total = 0;
            document.querySelectorAll('#refundTable > div').forEach(row => {
                const q = parseFloat(row.querySelector('.r-qty').value) || 0;
                const p = parseFloat(row.querySelector('.r-price').value) || 0;
                total += (q * p);
            });
            document.getElementById('refundTotalDisplay').innerText = total.toFixed(2);
            return total;
        }

        function openRefundModal(id, name) {
            activeInvoiceId = id;
            document.getElementById('targetCustomer').innerText = "فاتورة العميل: " + name;
            document.getElementById('refundTable').innerHTML = "";
            addRefundRow();
            document.getElementById('refundModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('refundModal').style.display = 'none'; }

        async function confirmRefund() {
            const refundTotal = calculateRefund();
            if(refundTotal <= 0) { alert("أدخل بيانات المرتجع"); return; }
            const saveBtn = document.querySelector('.btn-save-refund') || {innerText: ""};
            
            try {
                const { data: inv } = await _supabase.from('invoices').select('*').eq('id', activeInvoiceId).single();
                let refundItems = [];
                document.querySelectorAll('#refundTable > div').forEach(row => {
                    const item = row.querySelector('.r-name').value || "صنف";
                    const q = row.querySelector('.r-qty').value || 0;
                    const p = row.querySelector('.r-price').value || 0;
                    if(q > 0) refundItems.push({item, q, p, t: (q*p).toFixed(2)});
                });

                const parts = inv.customer_name.split("||");
                const updatedNameField = `${parts[0]}||${parts[1]}||${JSON.stringify(refundItems)}`;
                const newTotal = inv.total_amount - refundTotal;

                await _supabase.from('invoices').update({ customer_name: updatedNameField, total_amount: newTotal }).eq('id', activeInvoiceId);
                
                closeModal();
                fetchInvoices();
            } catch(e) { alert("خطأ في الاتصال"); }
        }

        window.onload = () => { fetchInvoices(); startStatusLoop(); 
            _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'invoices' }, fetchInvoices).subscribe();
        };
    </script>
</body>
</html>
