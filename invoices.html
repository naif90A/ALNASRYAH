<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الناصرية | تحديث الحالة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --danger: #e11d48;
            --warning: #f59e0b;
            --bg: #f8fafc;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 800px; margin: auto; }

        .header { background: var(--primary); color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* تأثير النبض للفاتورة الآجلة */
        .pulse-warning {
            background-color: #fffbeb !important;
            border: 2px solid var(--warning) !important;
            animation: pulse-yellow 2s infinite;
        }
        @keyframes pulse-yellow {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        .invoice-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-right: 6px solid var(--accent); position: relative; transition: 0.3s; }
        .card-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; }

        .inv-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .inv-table td, .inv-table th { padding: 8px; border-bottom: 1px solid #f1f5f9; text-align: right; font-size: 14px; }
        .row-ret { color: var(--danger); font-weight: bold; background: #fff1f2; }

        .total-box { display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; border-top: 2px dashed #eee; padding-top: 10px; }

        .btns { display: flex; gap: 8px; margin-top: 15px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-agel { background: #fff7ed; color: var(--warning); border: 1px solid #fed7aa; }
        .btn-ret { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-box { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 380px; }
        .modal-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .live-total { background: #fff1f2; padding: 10px; text-align: center; color: var(--danger); font-weight: bold; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <strong>نظام الناصرية | إدارة المبيعات</strong>
            <span style="font-size: 12px;">تحديث تلقائي ✅</span>
        </div>
        <div id="archiveList">جاري جلب البيانات...</div>
    </div>

    <div id="retModal" class="modal">
        <div class="modal-box">
            <h3 style="color:var(--danger)">🔄 تسجيل مرتجع</h3>
            <label>اسم الصنف:</label>
            <input type="text" id="retN">
            <div style="display:flex; gap:10px">
                <input type="number" id="retQ" placeholder="الكمية" value= oninput="updateLiveTotal()">
                <input type="number" id="retP" placeholder="السعر" oninput="updateLiveTotal()">
            </div>
            <div class="live-total">سيتم خصم: <span id="liveTotal">0.00</span> ر.س</div>
            <div class="btns">
                <button class="btn" style="background:var(--danger); color:white" onclick="submitReturn()">تأكيد</button>
                <button class="btn" style="background:#eee" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://doetvkkalypdktwiutex.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeInv = null;

        async function loadData() {
            const { data, error } = await _supabase.from('invoices').select('*').order('created_at', { ascending: false });
            if (error) {
                console.error("خطأ جلب:", error);
                return;
            }
            renderInvoices(data);
        }

        function renderInvoices(data) {
            let html = "";
            data.forEach(inv => {
                const parts = inv.customer_name ? inv.customer_name.split("||") : ["عميل", "[]"];
                const name = parts[0];
                let items = []; try { items = JSON.parse(parts[1]); } catch(e) {}
                
                const isAgel = inv.status === 'آجل';

                html += `
                <div class="invoice-card ${isAgel ? 'pulse-warning' : ''}">
                    <div class="card-header">
                        <span>👤 ${name}</span>
                        <span style="color:${isAgel ? 'var(--warning)' : '#888'}">${inv.status || 'مكتمل'}</span>
                    </div>
                    <table class="inv-table">
                        ${items.map(i => `
                            <tr class="${i.isReturn ? 'row-ret' : ''}">
                                <td>${i.isReturn ? '🔄 ' : ''}${i.item}</td>
                                <td>${i.q}</td>
                                <td>${Number(i.p).toFixed(2)}</td>
                                <td style="text-align:left">${Number(i.t).toFixed(2)}</td>
                            </tr>
                        `).join('')}
                    </table>
                    <div class="total-box">
                        <span>الصافي:</span>
                        <span>${Number(inv.total_amount).toFixed(2)} ر.س</span>
                    </div>
                    <div class="btns">
                        <button class="btn btn-agel" onclick="updateStatus('${inv.id}', 'آجل')">📌 آجل</button>
                        <button class="btn btn-ret" onclick="openReturnModal('${inv.id}', '${encodeURIComponent(parts[1])}', ${inv.total_amount}, '${name}')">🔄 مرتجع</button>
                    </div>
                </div>`;
            });
            document.getElementById('archiveList').innerHTML = html;
        }

        // دالة تحديث الحالة (آجل)
        async function updateStatus(id, newStatus) {
            console.log("محاولة تحديث الحالة إلى:", newStatus, "للفاتورة:", id);
            const { data, error } = await _supabase
                .from('invoices')
                .update({ status: newStatus })
                .eq('id', id)
                .select();

            if (error) {
                console.error("فشل التحديث:", error);
                alert("عذراً، لا يمكن التحديث. تأكد من تفعيل صلاحيات (Update Policy) في Supabase.");
            } else {
                console.log("تم التحديث بنجاح:", data);
                loadData(); // إعادة تحميل البيانات
            }
        }

        function openReturnModal(id, items, total, name) {
            activeInv = { id, items: JSON.parse(decodeURIComponent(items)), total, name };
            document.getElementById('retModal').style.display = 'flex';
        }

        function updateLiveTotal() {
            const q = document.getElementById('retQ').value || 0;
            const p = document.getElementById('retP').value || 0;
            document.getElementById('liveTotal').innerText = (q * p).toFixed(2);
        }

        function closeModal() { document.getElementById('retModal').style.display = 'none'; }

        async function submitReturn() {
            const n = document.getElementById('retN').value;
            const q = parseFloat(document.getElementById('retQ').value);
            const p = parseFloat(document.getElementById('retP').value);
            const t = q * p;

            if(!n || t <= 0) return alert("أدخل بيانات صحيحة");

            const newItems = [...activeInv.items, { item: n, q, p, t, isReturn: true }];
            const newTotal = activeInv.total - t;
            const customerStr = `${activeInv.name}||${JSON.stringify(newItems)}`;

            const { error } = await _supabase
                .from('invoices')
                .update({ customer_name: customerStr, total_amount: newTotal, status: 'مسترجع' })
                .eq('id', activeInv.id);

            if (error) {
                alert("خطأ في الحفظ: " + error.message);
            } else {
                closeModal();
                loadData();
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
