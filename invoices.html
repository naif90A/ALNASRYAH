<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الناصرية | إدارة المرتجعات الذكية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-dark: #0f172a;
            --accent-blue: #3b82f6;
            --day-frame-bg: #ffffff;
            --invoice-bg: #f8fafc;
            --returned-color: #ef4444;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f1f5f9; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 900px; margin: auto; }

        .header-main { background: var(--primary-dark); color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        .day-group { background: var(--day-frame-bg); border: 2px solid #cbd5e1; border-radius: 16px; padding: 25px 20px; margin-bottom: 45px; position: relative; }
        .day-label { position: absolute; top: -15px; right: 25px; background: var(--primary-dark); color: white; padding: 5px 25px; border-radius: 8px; font-weight: bold; }

        .invoice-card { background: var(--invoice-bg); border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .client-name { font-weight: 800; font-size: 17px; }

        .details-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 15px; }
        .details-table th { text-align: right; color: #94a3b8; border-bottom: 1px solid #e2e8f0; padding: 8px; }
        .details-table td { padding: 10px 8px; border-bottom: 1px solid #f1f5f9; }

        .total-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; border-top: 1px dashed #cbd5e1; padding-top: 10px; }

        .actions { display: flex; gap: 12px; margin-top: 15px; }
        .btn-status { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-pending { background: #fff7ed; color: #f59e0b; border: 1px solid #ffedd5; }
        .btn-returned { background: #fef2f2; color: var(--returned-color); border: 1px solid #fee2e2; }
        .btn-status:hover { opacity: 0.8; transform: translateY(-2px); }

        /* نافذة المرتجعات (Modal) */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center; z-index:1000; }
        .modal-box { background: white; width: 90%; max-width: 500px; border-radius: 15px; padding: 25px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-header { font-weight: bold; font-size: 18px; margin-bottom: 15px; color: var(--returned-color); border-bottom: 2px solid #fef2f2; padding-bottom: 10px; }
        
        .return-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid #f1f5f9; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        .return-item:hover { background: #fef2f2; border-color: #fee2e2; }
        .return-item span { font-size: 14px; font-weight: 500; }

        .btn-close { width: 100%; padding: 10px; margin-top: 15px; background: #f1f5f9; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-main">
            <h2>سجل فواتير الناصرية | المرتجعات 🕒</h2>
            <div id="syncStatus" style="font-size: 12px;">جاهز ✅</div>
        </div>
        <div id="archiveList"></div>
    </div>

    <div id="returnModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">إضافة منتج مسترجع (سيتم الخصم فورا)</div>
            <div id="itemsToReturn"></div>
            <button class="btn-close" onclick="closeModal()">إغلاق القائمة</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://doetvkkalypdktwiutex.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentActiveInvoice = null;

        async function loadArchive() {
            const listContainer = document.getElementById('archiveList');
            try {
                const { data, error } = await _supabase.from('invoices').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                const groups = {};
                data.forEach(inv => {
                    const date = new Date(inv.created_at).toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' });
                    if (!groups[date]) groups[date] = { items: [], total: 0 };
                    groups[date].items.push(inv);
                    groups[date].total += (inv.total_amount || 0);
                });

                let finalHtml = "";
                for (const date in groups) {
                    finalHtml += `<div class="day-group"><div class="day-label">${date}</div>
                        <div style="margin-bottom:15px; font-weight:bold; color:var(--accent-blue);">إجمالي مبيعات اليوم: ${groups[date].total.toFixed(2)} ر.س</div>
                        ${groups[date].items.map(inv => renderInvoice(inv)).join('')}</div>`;
                }
                listContainer.innerHTML = finalHtml;
            } catch (err) { console.error(err); }
        }

        function renderInvoice(inv) {
            const parts = inv.customer_name ? inv.customer_name.split("||") : ["عميل مجهول"];
            const currentStatus = inv.status || ""; 
            const statusBadge = currentStatus ? `<span style="font-size:11px; padding:3px 8px; border-radius:5px; background:${currentStatus === 'آجل' ? '#fff7ed':'#fef2f2'}; color:${currentStatus === 'آجل' ? '#f59e0b':'#ef4444'};">${currentStatus}</span>` : "";

            return `<div class="invoice-card">
                <div class="card-header"><div class="client-name">👤 ${parts[0]}</div> ${statusBadge}</div>
                <div class="actions">
                    <button class="btn-status btn-pending" onclick="updateStatus('${inv.id}', 'آجل')">وضع كـ آجل</button>
                    <button class="btn-status btn-returned" onclick="openReturnModal('${inv.id}', '${encodeURIComponent(parts[1] || '[]')}', ${inv.total_amount})">وضع كـ مسترجع</button>
                </div>
            </div>`;
        }

        async function updateStatus(id, status) {
            await _supabase.from('invoices').update({ status: status }).eq('id', id);
            loadArchive();
        }

        function openReturnModal(id, itemsJson, currentTotal) {
            currentActiveInvoice = { id, currentTotal };
            const items = JSON.parse(decodeURIComponent(itemsJson));
            const container = document.getElementById('itemsToReturn');
            
            if (items.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#94a3b8;'>لا توجد تفاصيل أصناف لهذه الفاتورة.</p>";
            } else {
                container.innerHTML = items.map((item, index) => `
                    <div class="return-item" onclick="processReturn('${item.item}', ${item.t}, ${index})">
                        <span>${item.item} (الكمية: ${item.q})</span>
                        <span style="color:var(--returned-color); font-weight:bold;">خصم ${item.t} ر.س</span>
                    </div>
                `).join('');
            }
            document.getElementById('returnModal').style.display = 'flex';
        }

        async function processReturn(itemName, itemAmount, index) {
            if (!confirm(`هل أنت متأكد من استرجاع "${itemName}"؟ سيتم خصم ${itemAmount} ر.س من الإجمالي.`)) return;

            const newTotal = Math.max(0, currentActiveInvoice.currentTotal - itemAmount);
            
            const { error } = await _supabase.from('invoices')
                .update({ 
                    total_amount: newTotal,
                    status: 'مسترجع' 
                })
                .eq('id', currentActiveInvoice.id);

            if (!error) {
                alert(`تم بنجاح! الإجمالي الجديد للفاتورة: ${newTotal.toFixed(2)} ر.س`);
                closeModal();
                loadArchive();
            } else {
                alert("حدث خطأ في الخصم.");
            }
        }

        function closeModal() { document.getElementById('returnModal').style.display = 'none'; }

        window.onload = loadArchive;
    </script>
</body>
</html>
