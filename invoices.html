<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل فواتير مشاتل الناصرية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary-color: #12192c; 
            --accent-color: #4fac81; 
            --bg-color: #f0f2f5; 
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
            --refund-color: #e74c3c;
            --credit-color: #f39c12;
            --alert-color: #e74c3c;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #1a1a1a; }
        .container { max-width: 800px; margin: auto; }

        /* الهيدر المطور مع العداد */
        .header-box { 
            background: white; padding: 20px; border-radius: 15px; 
            display: flex; flex-direction: column; gap: 10px;
            margin-bottom: 25px; box-shadow: var(--card-shadow); 
            position: sticky; top: 10px; z-index: 100; 
        }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .header-stats { display: flex; gap: 10px; align-items: center; margin-top: 5px; }

        h2 { color: var(--primary-color); margin: 0; font-size: 20px; }

        /* شكل عداد الأجهزة */
        .device-counter {
            background: #f1f5f9; color: #475569; padding: 5px 12px;
            border-radius: 20px; font-size: 12px; font-weight: bold;
            display: flex; align-items: center; gap: 5px;
            border: 1px solid #e2e8f0;
        }
        .online-dot { height: 8px; width: 8px; background: #10b981; border-radius: 50%; }

        .invoice-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: var(--card-shadow); border: 1px solid #eee; }
        .details-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        .details-table th { color: #999; text-align: right; padding: 8px 0; border-bottom: 1px solid #eee; }
        .details-table td { padding: 10px 0; border-bottom: 1px solid #fcfcfc; }
        
        .total-section { margin-top: 15px; text-align: left; color: var(--accent-color); font-weight: bold; font-size: 20px; border-top: 1px dashed #ddd; padding-top: 10px; }

        /* الأزرار والمودال (نفس تنسيقك السابق) */
        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.3s; }
        .btn-refund { background: #fef2f2; color: var(--refund-color); border: 1px solid #fee2e2; }
        .btn-credit { background: #fffbeb; color: var(--credit-color); border: 1px solid #fef3c7; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 10px; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        
        /* مؤشر الرقابة (المحاكاة) */
        .live-indicator { display: flex; align-items: center; font-size: 12px; font-weight: bold; padding: 5px 12px; border-radius: 20px; }
        .live-indicator.normal-mode { background-color: rgba(79, 172, 129, 0.1); color: var(--accent-color); }
        .live-indicator.alert-mode { background-color: rgba(231, 76, 60, 0.1); color: var(--alert-color); }
        .dot { height: 8px; width: 8px; border-radius: 50%; margin-left: 8px; }
        .normal-mode .dot { background: var(--accent-color); animation: pulse 1.5s infinite; }
        .alert-mode .dot { background: var(--alert-color); animation: pulse 0.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-box">
            <div class="header-top">
                <h2>سجل فواتير الناصرية ☁️</h2>
                <div class="device-counter" title="عدد الأجهزة التي تفتح هذه الصفحة الآن">
                    <span class="online-dot"></span>
                    متصل الآن: <span id="onlineCount">1</span>
                </div>
            </div>
            
            <div class="header-stats">
                <div id="liveIndicator" class="live-indicator normal-mode">
                    <span id="statusText">اتصال آمن</span>
                    <span class="dot"></span>
                </div>
            </div>
        </div>

        <div id="archiveList"></div>
    </div>

    <div id="refundModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color: var(--refund-color); margin-top: 0;">🔄 تسجيل مسترجعات</h3>
            <p id="targetCustomer" style="font-weight: bold; color: #555;"></p>
            <div id="refundTable"></div>
            <button style="width:100%; padding:10px; margin:10px 0;" onclick="addRefundRow()">+ إضافة صنف</button>
            <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; font-size: 18px; font-weight: bold;">
                الإجمالي: <span id="refundTotalDisplay">0.00</span> ر.س
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn" style="background:var(--refund-color); color:white; flex:2" onclick="confirmRefund()">حفظ</button>
                <button class="btn" style="background:#eee; flex:1" onclick="closeModal()">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://doetvkkalypdktwiutex.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 1. نظام عداد الأجهزة الحقيقي (Real Presence) ---
        function initDeviceTracker() {
            const channel = _supabase.channel('room_1');

            channel
                .on('presence', { event: 'sync' }, () => {
                    const newState = channel.presenceState();
                    // تحديث الرقم بناءً على المفاتيح الفريدة للأجهزة المتصلة
                    document.getElementById('onlineCount').innerText = Object.keys(newState).length;
                })
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        // تسجيل هذا الجهاز في القائمة الحية
                        await channel.track({ online_at: new Date().toISOString() });
                    }
                });
        }

        // --- 2. نظام محاكاة الرقابة (نفس منطقك السابق) ---
        function startInspectionSim() {
            const statusText = document.getElementById('statusText');
            const indicatorDiv = document.getElementById('liveIndicator');
            
            setInterval(() => {
                // احتمال 10% كل دقيقة لظهور التفتيش
                if(Math.random() > 0.9) {
                    indicatorDiv.className = 'live-indicator alert-mode';
                    statusText.innerText = "⚠️ دخول الرقابة والتفتيش...";
                    setTimeout(() => {
                        indicatorDiv.className = 'live-indicator normal-mode';
                        statusText.innerText = "اتصال آمن";
                    }, 30000); // يبقى 30 ثانية
                }
            }, 60000);
        }

        // --- 3. وظائف جلب البيانات (كما هي) ---
        async function fetchInvoices() {
            const { data, error } = await _supabase.from('invoices').select('*').order('created_at', { ascending: false });
            if (error) return;

            document.getElementById('archiveList').innerHTML = data.map(inv => {
                const parts = inv.customer_name ? inv.customer_name.split("||") : ["عميل مجهول"];
                return `
                    <div class="invoice-card">
                        <div style="display:flex; justify-content:space-between;">
                            <div style="font-weight:bold;">👤 ${parts[0]}</div>
                            <div style="font-size:11px; color:#999;">${new Date(inv.created_at).toLocaleString('ar-SA')}</div>
                        </div>
                        <div class="total-section">${inv.total_amount.toLocaleString()} ر.س</div>
                        <div class="action-buttons">
                            <button class="btn btn-refund" onclick="openRefundModal('${inv.id}', '${parts[0]}')">🔄 مرتجع</button>
                        </div>
                    </div>`;
            }).join('');
        }

        window.onload = () => { 
            fetchInvoices(); 
            initDeviceTracker(); // تشغيل عداد الأجهزة الحقيقي
            startInspectionSim(); // تشغيل محاكاة الرقابة
        };
    </script>
</body>
</html>
