<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل فواتير الناصرية المباشر 🕒</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary-color: #12192c; 
            --accent-color: #4fac81; 
            --bg-color: #f0f2f5; 
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
            --refund-color: #e74c3c;
            --credit-color: #f39c12;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #1a1a1a; }
        .container { max-width: 800px; margin: auto; }

        .header-box { background: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; box-shadow: var(--card-shadow); position: sticky; top: 10px; z-index: 100; }
        h2 { color: var(--primary-color); margin: 0; font-size: 22px; }
        
        .live-indicator { display: flex; align-items: center; font-size: 13px; color: var(--accent-color); font-weight: bold; }
        .dot { height: 8px; width: 8px; background-color: var(--accent-color); border-radius: 50%; margin-left: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79, 172, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(79, 172, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79, 172, 129, 0); } }

        .invoice-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: var(--card-shadow); border: 1px solid #eee; }
        .details-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        .details-table th { color: #999; text-align: right; padding: 8px 0; border-bottom: 1px solid #eee; }
        .details-table td { padding: 10px 0; border-bottom: 1px solid #fcfcfc; }
        
        .total-section { margin-top: 15px; text-align: left; color: var(--accent-color); font-weight: bold; font-size: 20px; border-top: 1px dashed #ddd; padding-top: 10px; }

        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        .btn:active { opacity: 0.7; }
        .btn-refund { background: #fef2f2; color: var(--refund-color); border: 1px solid #fee2e2; }
        .btn-credit { background: #fffbeb; color: var(--credit-color); border: 1px solid #fef3c7; }

        /* Modal Settings */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 15px; box-sizing: border-box; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .refund-row { display: flex; gap: 5px; margin-bottom: 10px; align-items: center; }
        .refund-row input { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; flex: 1; min-width: 0; }
        .btn-add-row { background: var(--primary-color); color: white; width: 100%; margin: 15px 0; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save-refund { background: var(--refund-color); color: white; flex: 2; }
        .btn-close { background: #eee; color: #666; flex: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-box">
            <h2>🕒 سجل فواتير الناصرية المباشر</h2>
            <div class="live-indicator"><span id="statusText">متصل بالسحابة</span><span class="dot"></span></div>
        </div>
        <div id="archiveList"><div style="text-align:center; padding:50px;">جاري تحميل الفواتير...</div></div>
    </div>

    <div id="refundModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color: var(--refund-color); margin: 0 0 5px 0;">🔄 تسجيل فاتورة مسترجع</h3>
            <p id="targetCustomer" style="font-weight: bold; color: #666; margin-bottom: 20px;"></p>
            
            <div id="refundTable"></div>
            
            <button class="btn-add-row" onclick="addRefundRow()">+ إضافة صنف مسترجع جديد</button>
            
            <div style="background: #fff5f5; border: 1px solid #fee2e2; padding: 15px; border-radius: 12px; text-align: center; font-size: 18px; font-weight: bold; margin-top: 10px; color: var(--refund-color);">
                مجموع المرتجعات: <span id="refundTotalDisplay">0.00</span> ر.س
            </div>

            <div class="modal-footer">
                <button class="btn btn-save-refund" id="btnConfirmRefund" onclick="confirmRefund()">💾 حفظ وخصم من السحابة</button>
                <button class="btn btn-close" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // الروابط الخاصة بك (لا يتم تعديلها)
        const SUPABASE_URL = 'https://doetvkkalypdktwiutex.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeInvoiceId = null;

        async function fetchInvoices() {
            const listContainer = document.getElementById('archiveList');
            try {
                const { data, error } = await _supabase.from('invoices').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                listContainer.innerHTML = data.map(inv => {
                    const parts = inv.customer_name ? inv.customer_name.split("||") : ["عميل مجهول"];
                    const name = parts[0];
                    let rowsHtml = "";
                    
                    try {
                        // 1. الأصناف الأصلية
                        if (parts[1]) {
                            JSON.parse(parts[1]).forEach(i => {
                                rowsHtml += `<tr><td>${i.item}</td><td>${i.q}</td><td>${i.p}</td><td style="text-align:left; font-weight:bold;">${i.t} ر.س</td></tr>`;
                            });
                        }
                        // 2. المرتجعات (الجزء الثالث من البيانات)
                        if (parts[2]) {
                            rowsHtml += `<tr><td colspan="4" style="color:var(--refund-color); font-weight:bold; border-top:2px solid #fee2e2; padding-top:15px; text-align:center; font-size:12px;">⬇ قائمة المرتجعات ⬇</td></tr>`;
                            JSON.parse(parts[2]).forEach(i => {
                                rowsHtml += `<tr style="color:var(--refund-color); font-style:italic; background:#fffafa;"><td>${i.item} (مرتجع)</td><td>${i.q}-</td><td>${i.p}</td><td style="text-align:left; font-weight:bold;">${i.t}- ر.س</td></tr>`;
                            });
                        }
                    } catch(e) { rowsHtml = "<tr><td colspan='4' style='color:orange;'>بيانات بتنسيق قديم</td></tr>"; }

                    return `
                        <div class="invoice-card">
                            <div style="display:flex; justify-content:space-between; align-items:start;">
                                <div style="font-weight:bold; color:var(--primary-color); font-size:18px;">👤 ${name}</div>
                                <div style="font-size:11px; color:#999; background:#f8f9fa; padding:4px 8px; border-radius:10px;">📅 ${new Date(inv.created_at).toLocaleString('ar-SA')}</div>
                            </div>
                            <table class="details-table">
                                <thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th style="text-align:left;">الإجمالي</th></tr></thead>
                                <tbody>${rowsHtml}</tbody>
                            </table>
                            <div class="total-section">
                                <span style="font-size:11px; color:#999; font-weight:normal;">الصافي النهائي:</span><br>
                                ${inv.total_amount.toLocaleString('ar-SA')} ر.س
                            </div>
                            <div class="action-buttons">
                                <button class="btn btn-refund" onclick="openRefundModal('${inv.id}', '${name}')">🔄 تسجيل مسترجع</button>
                                <button class="btn btn-credit" onclick="alert('تم تحديد الفاتورة كـ آجل')">⏳ آجل</button>
                            </div>
                        </div>`;
                }).join('');
            } catch (err) { console.error(err); }
        }

        // إعدادات جدول المسترجعات داخل النافذة
        function addRefundRow() {
            const container = document.getElementById('refundTable');
            const div = document.createElement('div');
            div.className = 'refund-row';
            div.innerHTML = `
                <input type="text" class="r-name" placeholder="اسم الصنف المسترجع" style="flex:2">
                <input type="number" class="r-qty" placeholder="الكمية" style="flex:1" oninput="updateTotal()">
                <input type="number" class="r-price" placeholder="السعر" style="flex:1" oninput="updateTotal()">
                <button onclick="this.parentElement.remove(); updateTotal();" style="border:none; background:none; color:red; cursor:pointer; font-size:20px;">×</button>
            `;
            container.appendChild(div);
        }

        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.refund-row').forEach(row => {
                const q = parseFloat(row.querySelector('.r-qty').value) || 0;
                const p = parseFloat(row.querySelector('.r-price').value) || 0;
                total += (q * p);
            });
            document.getElementById('refundTotalDisplay').innerText = total.toFixed(2);
            return total;
        }

        function openRefundModal(id, name) {
            activeInvoiceId = id;
            document.getElementById('targetCustomer').innerText = "فاتورة العميل: " + name;
            document.getElementById('refundTable').innerHTML = "";
            document.getElementById('refundTotalDisplay').innerText = "0.00";
            addRefundRow();
            document.getElementById('refundModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('refundModal').style.display = 'none'; }

        async function confirmRefund() {
            const refundTotal = updateTotal();
            if(refundTotal <= 0) { alert("يرجى إدخال أصناف مسترجعة أولاً"); return; }

            const btn = document.getElementById('btnConfirmRefund');
            btn.innerText = "جاري الحفظ في السحابة...";
            btn.disabled = true;

            try {
                // 1. جلب بيانات الفاتورة الحالية من السحابة
                const { data: inv, error: fErr } = await _supabase.from('invoices').select('*').eq('id', activeInvoiceId).single();
                if(fErr) throw fErr;

                // 2. تجميع قائمة المسترجعات الجديدة
                let refundItems = [];
                document.querySelectorAll('.refund-row').forEach(row => {
                    const item = row.querySelector('.r-name').value || "صنف مسترجع";
                    const q = row.querySelector('.r-qty').value || 0;
                    const p = row.querySelector('.r-price').value || 0;
                    if(q > 0) refundItems.push({item, q, p, t: (q*p).toFixed(2)});
                });

                // 3. بناء هيكل البيانات الجديد (الاسم || الأصل || المرتجع)
                const parts = inv.customer_name.split("||");
                // دمج المرتجعات الجديدة مع أي مسترجعات سابقة إن وجدت
                let existingRefunds = parts[2] ? JSON.parse(parts[2]) : [];
                let combinedRefunds = existingRefunds.concat(refundItems);
                
                const updatedNameField = parts[0] + "||" + (parts[1] || "[]") + "||" + JSON.stringify(combinedRefunds);
                const newTotal = inv.total_amount - refundTotal;

                // 4. تحديث السحابة
                const { error: uErr } = await _supabase.from('invoices')
                    .update({ customer_name: updatedNameField, total_amount: newTotal })
                    .eq('id', activeInvoiceId);

                if(uErr) throw uErr;

                alert("تم تحديث الفاتورة وخصم المرتجع بنجاح! ✅");
                closeModal();
                fetchInvoices();

            } catch(err) {
                alert("فشل التحديث: " + err.message);
            } finally {
                btn.innerText = "💾 حفظ وخصم من السحابة";
                btn.disabled = false;
            }
        }

        function initRealtime() {
            _supabase.channel('realtime-invoices').on('postgres_changes', { event: '*', schema: 'public', table: 'invoices' }, () => fetchInvoices()).subscribe();
        }

        window.onload = () => { fetchInvoices(); initRealtime(); };
    </script>
</body>
</html>
