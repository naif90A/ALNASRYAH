<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل فواتير الناصرية الذكي</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #10b981;
            --red-danger: #ef4444; 
            --bg: #f8fafc;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); padding: 20px; direction: rtl; }
        .container { max-width: 900px; margin: auto; }

        .header {
            background: var(--primary); color: white; padding: 20px;
            border-radius: 15px; text-align: center; margin-bottom: 30px;
        }

        .invoice-card {
            background: white; padding: 20px; border-radius: 12px;
            margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease; border: 2px solid #e2e8f0;
        }

        /* تنسيق الفاتورة الآجلة (تتحول للون الأحمر) */
        .card-urgent { 
            background-color: #fee2e2 !important; 
            border-color: var(--red-danger) !important; 
        }

        .returned-items-box {
            margin-top: 15px; padding: 10px;
            background: #f1f5f9; border-radius: 8px;
            border-right: 4px solid #64748b; font-size: 0.9rem;
            color: #1e293b;
        }

        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }

        .btn {
            padding: 10px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
            font-size: 0.85rem;
        }
        .btn-returned { background: #64748b; color: white; }
        .btn-urgent { background: var(--red-danger); color: white; }
        .btn-reset { background: #e2e8f0; color: #475569; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        .total { font-size: 1.4rem; font-weight: 800; color: var(--accent); margin: 10px 0; }
        .status-label { font-weight: bold; color: var(--red-danger); margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📊 سجل فواتير الناصرية (نظام الإدارة)</h2>
    </div>

    <div id="main-content">
        <div style="text-align:center;">جاري جلب الفواتير من السحابة...</div>
    </div>
</div>

<script>
    // بيانات الربط الخاصة بك
    const SB_URL = 'https://doetvkkalypdktwiutex.supabase.co';
    const PUBLIC_KEY = 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir';
    const _supabase = supabase.createClient(SB_URL, PUBLIC_KEY);

    async function loadInvoices() {
        const content = document.getElementById('main-content');
        try {
            const { data, error } = await _supabase
                .from('invoices')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (!data || data.length === 0) {
                content.innerHTML = '<div style="text-align:center;">لا توجد فواتير حالياً.</div>';
                return;
            }

            content.innerHTML = data.map(inv => {
                const isUrgent = inv.status === "آجل";
                const returnedItems = inv.returned_items || ""; 
                const name = inv.customer_name ? inv.customer_name.split("||")[0] : "عميل بدون اسم";

                return `
                    <div class="invoice-card ${isUrgent ? 'card-urgent' : ''}">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <strong>👤 ${name}</strong>
                            <span style="color:#64748b; font-size:0.8rem;">📅 ${new Date(inv.created_at).toLocaleDateString('ar-SA')}</span>
                        </div>
                        
                        <div class="total">${inv.total_amount ? inv.total_amount.toLocaleString() : 0} ر.س</div>
${isUrgent ? '<span class="status-label">⚠️ هذه الفاتورة "آجل"</span>' : ''}

                        ${returnedItems ? `
                            <div class="returned-items-box">
                                <strong>📦 الأصناف المسترجعة:</strong><br>
                                ${returnedItems}
                            </div>
                        ` : ''}

                        <div class="actions">
                            <button class="btn btn-returned" onclick="markAsReturned('${inv.id}')">🔄 مسترد</button>
                            <button class="btn btn-urgent" onclick="markAsUrgent('${inv.id}')">🔴 آجل</button>
                            <button class="btn btn-reset" onclick="resetStatus('${inv.id}')">إلغاء الحالة</button>
                        </div>
                    </div>
                `;
            }).join('');

        } catch (err) {
            content.innerHTML = <div style="color:red; text-align:center;">خطأ: ${err.message}</div>;
        }
    }

    async function markAsReturned(id) {
        const items = prompt("الرجاء كتابة الأصناف المسترجعة:");
        if (items !== null && items !== "") {
            const { error } = await _supabase
                .from('invoices')
                .update({ status: 'مسترد', returned_items: items })
                .eq('id', id);
            if (!error) loadInvoices();
            else alert("فشل التحديث: تأكد من وجود عمود returned_items في Supabase");
        }
    }

    async function markAsUrgent(id) {
        const { error } = await _supabase
            .from('invoices')
            .update({ status: 'آجل' })
            .eq('id', id);
        if (!error) loadInvoices();
    }

    async function resetStatus(id) {
        const { error } = await _supabase
            .from('invoices')
            .update({ status: '', returned_items: null })
            .eq('id', id);
        if (!error) loadInvoices();
    }

    window.onload = loadInvoices;
</script>
</body>
</html>
