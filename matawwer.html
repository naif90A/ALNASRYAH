<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الناصرية المتقدمة</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #10b981;
            --danger: #ef4444;
            --secondary: #64748b;
            --bg: #f1f5f9;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); padding: 20px; direction: rtl; }
        .container { max-width: 1000px; margin: auto; }

        .header {
            background: var(--primary); color: white; padding: 25px;
            border-radius: 15px; text-align: center; margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .invoice-card {
            background: white; padding: 20px; border-radius: 12px;
            margin-bottom: 15px; border: 1px solid #e2e8f0;
            transition: transform 0.2s; position: relative;
        }

        .card-urgent { border: 2px solid var(--danger); background: #fff1f2; }
        
        .badge-urgent { background: var(--danger); color: white; padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; }

        .total-price { font-size: 1.5rem; font-weight: bold; color: var(--accent); }

        .returned-items-box {
            margin-top: 10px; padding: 10px; background: #f8fafc;
            border-right: 4px solid var(--secondary); border-radius: 5px; font-size: 0.9rem;
        }

        .actions { display: flex; gap: 10px; margin-top: 15px; }

        .btn {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: 600; transition: 0.3s;
        }

        .btn-returned { background: var(--secondary); color: white; }
        .btn-urgent { background: var(--danger); color: white; }
        .btn-reset { background: #e2e8f0; color: #1e293b; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🛠️ لوحة تطوير الناصرية (نسخة التجربة)</h1>
        <p>إدارة الفواتير والمسترجعات بشكل مباشر</p>
    </div>

    <div id="data-container">
        <div style="text-align:center; padding:50px;">جاري الاتصال بالسحابة...</div>
    </div>
</div>

<script>
    // بيانات مشروعك AlnassriahProject
    const SB_URL = 'https://doetvkkalypdktwiutex.supabase.co';
    const SB_KEY = 'sb_publishable_xBLqvv8nmPKrbeoH0Ergng_NIofLzir';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function fetchInvoices() {
        const container = document.getElementById('data-container');
        const { data, error } = await _supabase
            .from('invoices')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            container.innerHTML = <p style="color:red">خطأ في الجلب: ${error.message}</p>;
            return;
        }

        if (data.length === 0) {
            container.innerHTML = <p style="text-align:center">لا توجد بيانات حالياً</p>;
            return;
        }

        container.innerHTML = data.map(inv => {
            const isUrgent = inv.status === "آجل";
            const customer = inv.customer_name ? inv.customer_name.split("||")[0] : "عميل جديد";
            
            return `
                <div class="invoice-card ${isUrgent ? 'card-urgent' : ''}">
                    <div style="display:flex; justify-content:space-between">
                        <strong>👤 ${customer}</strong>
                        <span>📅 ${new Date(inv.created_at).toLocaleDateString('ar-SA')}</span>
                    </div>

                    <div class="total-price">${inv.total_amount ? inv.total_amount.toLocaleString() : 0} ر.س</div>

                    ${isUrgent ? '<div style="margin-bottom:10px"><span class="badge-urgent">⚠️ فاتورة آجلة</span></div>' : ''}

                    ${inv.returned_items ? `
                        <div class="returned-items-box">
<strong>📦 مسترجعات:</strong> ${inv.returned_items}
                        </div>
                    ` : ''}

                    <div class="actions">
                        <button class="btn btn-returned" onclick="handleReturned('${inv.id}')">🔄 مسترد</button>
                        <button class="btn btn-urgent" onclick="handleUrgent('${inv.id}')">🔴 آجل</button>
                        <button class="btn btn-reset" onclick="handleReset('${inv.id}')">إلغاء</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function handleReturned(id) {
        const items = prompt("الأصناف المسترجعة:");
        if (items) {
            await _supabase.from('invoices').update({ status: 'مسترد', returned_items: items }).eq('id', id);
            fetchInvoices();
        }
    }

    async function handleUrgent(id) {
        await _supabase.from('invoices').update({ status: 'آجل' }).eq('id', id);
        fetchInvoices();
    }

    async function handleReset(id) {
        await _supabase.from('invoices').update({ status: '', returned_items: null }).eq('id', id);
        fetchInvoices();
    }

    window.onload = fetchInvoices;
</script>
</body>
</html>
